<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Volume and surface area core formulas" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Volume & surface area: core formulas</text>
  <text x="40" y="92" class="s">Use cm³ for volume and cm² for surface area.</text>

  <g transform="translate(60,130)">
    <rect x="0" y="0" width="780" height="230" class="box" rx="16"/>

    <text x="30" y="55" class="k">Cuboid</text>
    <text x="200" y="55" class="m">V = lwh</text>
    <text x="410" y="55" class="m">SA = 2(lw + lh + wh)</text>

    <text x="30" y="110" class="k">Cylinder</text>
    <text x="200" y="110" class="m">V = πr²h</text>
    <text x="410" y="110" class="m">SA = 2πr² + 2πrh</text>

    <text x="30" y="165" class="k">Sphere</text>
    <text x="200" y="165" class="m">V = (4/3)πr³</text>
    <text x="410" y="165" class="m">SA = 4πr²</text>

    <text x="30" y="220" class="k">Cone</text>
    <text x="200" y="220" class="m">V = (1/3)πr²h</text>
  </g>
</svg>
