<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Tangent is perpendicular to radius" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:4;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Tangent-radius theorem</text>
  <text x="40" y="92" class="s">A tangent meets the radius at 90° at the point of contact.</text>

  <g transform="translate(190,120)">
    <circle cx="200" cy="160" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <circle cx="200" cy="160" r="4" fill="#0f172a"/>
    <line x1="200" y1="160" x2="340" y2="160" class="accent"/>
    <line x1="340" y1="40" x2="340" y2="300" stroke="#0f172a" stroke-width="4"/>
    <rect x="328" y="148" width="24" height="24" fill="none" stroke="#0f172a" stroke-width="2"/>
    <text x="362" y="170" class="k">90°</text>
  </g>
</svg>
