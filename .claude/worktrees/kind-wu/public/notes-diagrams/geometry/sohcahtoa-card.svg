<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="SOHCAHTOA cheat sheet" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">SOHCAHTOA (right-angled triangles)</text>
  <text x="40" y="92" class="s">Pick the ratio that uses the sides you have / need.</text>

  <g transform="translate(60,130)">
    <rect x="0" y="0" width="780" height="220" class="box" rx="16"/>
    <text x="40" y="60" class="k">SOH</text>
    <text x="140" y="60" class="m">sin θ = opposite / hypotenuse</text>

    <text x="40" y="115" class="k">CAH</text>
    <text x="140" y="115" class="m">cos θ = adjacent / hypotenuse</text>

    <text x="40" y="170" class="k">TOA</text>
    <text x="140" y="170" class="m">tan θ = opposite / adjacent</text>
  </g>

  <text x="60" y="385" class="s">Tip: always label opposite/adjacent relative to θ first.</text>
</svg>
