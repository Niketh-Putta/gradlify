<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Enlargement with centre and scale factor" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .a{fill:#a78bfa;opacity:.25;stroke:#7c3aed;stroke-width:3}
      .b{fill:#86efac;opacity:.22;stroke:#16a34a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Enlargement: centre and scale factor</text>
  <text x="40" y="92" class="s">Draw rays from the centre through each vertex; scale along the rays.</text>

  <g transform="translate(140,130)">
    <circle cx="90" cy="200" r="5" fill="#0f172a"/>
    <text x="100" y="205" class="k">centre</text>

    <polygon points="220,220 280,220 280,160 220,160" class="a"/>
    <polygon points="370,250 490,250 490,130 370,130" class="b"/>

    <line x1="90" y1="200" x2="220" y2="220" stroke="#0f172a" stroke-width="2" opacity="0.6"/>
    <line x1="90" y1="200" x2="220" y2="160" stroke="#0f172a" stroke-width="2" opacity="0.6"/>
    <line x1="90" y1="200" x2="280" y2="220" stroke="#0f172a" stroke-width="2" opacity="0.6"/>
    <line x1="90" y1="200" x2="280" y2="160" stroke="#0f172a" stroke-width="2" opacity="0.6"/>

    <text x="235" y="150" class="k">original</text>
    <text x="410" y="120" class="k">scale factor 2</text>
  </g>
</svg>
