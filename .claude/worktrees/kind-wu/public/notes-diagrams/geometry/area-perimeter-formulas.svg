<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Area and perimeter: core formulas" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Area vs perimeter: the formula set GCSE loves</text>
  <text x="40" y="92" class="s">Always include units: cm² for area, cm for perimeter.</text>

  <g transform="translate(60,130)">
    <rect x="0" y="0" width="780" height="230" class="box" rx="16"/>

    <text x="30" y="55" class="k">Rectangle</text>
    <text x="220" y="55" class="m">A = l × w</text>
    <text x="420" y="55" class="m">P = 2(l + w)</text>

    <text x="30" y="105" class="k">Triangle</text>
    <text x="220" y="105" class="m">A = ½ × b × h</text>

    <text x="30" y="155" class="k">Parallelogram</text>
    <text x="220" y="155" class="m">A = b × h</text>

    <text x="30" y="205" class="k">Trapezium</text>
    <text x="220" y="205" class="m">A = ½(a + b)h</text>

    <text x="520" y="155" class="k">Circle</text>
    <text x="640" y="155" class="m">A = πr²</text>
    <text x="640" y="205" class="m">C = 2πr</text>
  </g>
</svg>
