<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Circle theorems overview" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Circle theorems: two biggest exam patterns</text>
  <text x="40" y="92" class="s">Centre angle is double circumference angle; angle in a semicircle is 90°.</text>

  <g transform="translate(120,120)">
    <circle cx="180" cy="170" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <circle cx="620" cy="170" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>

    <!-- left: centre vs circumference -->
    <circle cx="180" cy="170" r="4" fill="#0f172a"/>
    <line x1="180" y1="170" x2="80" y2="80" class="accent"/>
    <line x1="180" y1="170" x2="310" y2="120" class="accent"/>
    <line x1="80" y1="80" x2="310" y2="120" stroke="#0f172a" stroke-width="3"/>
    <text x="170" y="90" class="k">2x</text>
    <text x="195" y="145" class="k">x</text>
    <text x="60" y="330" class="m">centre angle = 2 × circumference angle</text>

    <!-- right: semicircle -->
    <circle cx="620" cy="170" r="4" fill="#0f172a"/>
    <line x1="480" y1="170" x2="760" y2="170" stroke="#0f172a" stroke-width="3"/>
    <line x1="480" y1="170" x2="620" y2="60" stroke="#7c3aed" stroke-width="3"/>
    <line x1="760" y1="170" x2="620" y2="60" stroke="#7c3aed" stroke-width="3"/>
    <text x="610" y="120" class="k">90°</text>
    <text x="490" y="330" class="m">angle in a semicircle = 90°</text>
  </g>
</svg>
