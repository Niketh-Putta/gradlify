<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Circle: radius and diameter" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Circle reminder: r is half of d</text>
  <text x="40" y="92" class="s">Most mistakes happen when d is used in a radius formula.</text>

  <g transform="translate(190,120)">
    <circle cx="200" cy="160" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <line x1="60" y1="160" x2="340" y2="160" stroke="#7c3aed" stroke-width="4"/>
    <circle cx="200" cy="160" r="4" fill="#0f172a"/>
    <line x1="200" y1="160" x2="340" y2="160" stroke="#16a34a" stroke-width="4"/>

    <text x="200" y="200" class="k" text-anchor="middle">diameter d</text>
    <text x="280" y="145" class="k">radius r</text>
  </g>

  <g transform="translate(620,170)">
    <text x="0" y="0" class="m">d = 2r</text>
    <text x="0" y="40" class="m">r = d/2</text>
    <text x="0" y="90" class="s">Use r in A = πr² and C = 2πr.</text>
  </g>
</svg>
