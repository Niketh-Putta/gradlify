<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Parallel lines: corresponding, alternate and co-interior angles" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .pill{fill:#ffffff;stroke:#e2e8f0;stroke-width:2}
      .lab{font:800 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#7c3aed}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Angles in parallel lines (F, Z, C)</text>
  <text x="40" y="92" class="s">Mark equal angles as you go: it keeps chains of reasoning clear.</text>

  <!-- Parallel lines + transversal -->
  <g transform="translate(90,120)">
    <line x1="0" y1="40" x2="520" y2="40" stroke="#0f172a" stroke-width="3"/>
    <line x1="0" y1="220" x2="520" y2="220" stroke="#0f172a" stroke-width="3"/>
    <!-- arrows to show parallel -->
    <polygon points="250,30 265,40 250,50" fill="#0f172a"/>
    <polygon points="290,30 305,40 290,50" fill="#0f172a"/>
    <polygon points="250,210 265,220 250,230" fill="#0f172a"/>
    <polygon points="290,210 305,220 290,230" fill="#0f172a"/>

    <line x1="80" y1="260" x2="440" y2="0" stroke="#7c3aed" stroke-width="4"/>

    <!-- labels only (no curved marks) -->
    <circle cx="480" cy="70" r="18" class="pill"/>
    <text x="480" y="76" class="lab" text-anchor="middle">x</text>

    <circle cx="230" cy="195" r="18" class="pill"/>
    <text x="230" y="201" class="lab" text-anchor="middle">x</text>

    <rect x="260" y="176" width="104" height="34" rx="16" class="pill"/>
    <text x="312" y="199" class="lab" text-anchor="middle">180°−x</text>

    <!-- helper labels -->
    <text x="560" y="75" class="k">F-shape: corresponding</text>
    <text x="560" y="115" class="eq">x = x</text>

    <text x="560" y="175" class="k">Z-shape: alternate</text>
    <text x="560" y="215" class="eq">x = x</text>

    <text x="560" y="275" class="k">C-shape: co-interior</text>
    <text x="560" y="315" class="eq">sum = 180°</text>
  </g>
</svg>
