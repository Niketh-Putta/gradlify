<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Arc length and sector area diagram" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .sector{fill:#a78bfa;opacity:.25;stroke:#7c3aed;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Arc length and sector area (θ in degrees)</text>
  <text x="40" y="92" class="s">Both are “fraction of a full circle” using θ/360.</text>

  <g transform="translate(140,120)">
    <circle cx="200" cy="200" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <path d="M 200 200 L 340 200 A 140 140 0 0 1 279 90 Z" class="sector"/>
    <circle cx="200" cy="200" r="4" fill="#0f172a"/>
    <text x="240" y="165" class="k">θ</text>
    <text x="360" y="110" class="m">Arc = (θ/360) · 2πr</text>
    <text x="360" y="150" class="m">Area = (θ/360) · πr²</text>
  </g>
</svg>
