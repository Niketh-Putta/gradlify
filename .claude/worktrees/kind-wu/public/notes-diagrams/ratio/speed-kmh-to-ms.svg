<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Convert km/h to m/s by multiplying by 1000 and dividing by 3600">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Speed unit conversion</text>
  <text x="40" y="92" class="s">To convert km/h to m/s: multiply by 1000 and divide by 3600</text>

  <g transform="translate(70,140)">
    <rect x="0" y="0" width="760" height="210" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>

    <text x="30" y="55" class="k">1 km/h =</text>
    <text x="150" y="55" class="s">1000 m per hour</text>
    <text x="30" y="105" class="k">=</text>
    <text x="70" y="105" class="s">1000 m ÷ 3600 s</text>
    <text x="30" y="155" class="k">=</text>
    <text x="70" y="155" class="s">(1000/3600) m/s = (5/18) m/s</text>

    <rect x="520" y="45" width="210" height="120" rx="16" class="box"/>
    <text x="625" y="85" class="k" text-anchor="middle">Shortcut</text>
    <text x="625" y="120" class="s" text-anchor="middle">km/h × 5/18</text>
    <text x="625" y="152" class="s" text-anchor="middle">= m/s</text>
  </g>

  <text x="40" y="388" class="s">Example: 72 km/h → 72×5/18 = 20 m/s</text>
</svg>
