<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Flowchart for sharing an amount in a ratio">
  <defs>
    <style>
      .t{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .b{fill:#ffffff;stroke:#94a3b8;stroke-width:2}
      .a{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Sharing in a ratio: reliable method</text>
  <text x="40" y="92" class="s">Add parts → find 1 part → multiply</text>

  <rect x="60" y="140" width="250" height="80" rx="16" class="b"/>
  <text x="185" y="175" class="t" text-anchor="middle">Step 1</text>
  <text x="185" y="205" class="s" text-anchor="middle">Add ratio parts</text>

  <rect x="330" y="140" width="250" height="80" rx="16" class="b"/>
  <text x="455" y="175" class="t" text-anchor="middle">Step 2</text>
  <text x="455" y="205" class="s" text-anchor="middle">Total ÷ parts</text>

  <rect x="600" y="140" width="250" height="80" rx="16" class="b"/>
  <text x="725" y="175" class="t" text-anchor="middle">Step 3</text>
  <text x="725" y="205" class="s" text-anchor="middle">Multiply for each share</text>

  <line x1="310" y1="180" x2="330" y2="180" class="a"/>
  <line x1="580" y1="180" x2="600" y2="180" class="a"/>

  <rect x="60" y="270" width="790" height="110" rx="18" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="90" y="310" class="s">Example: Share £60 in the ratio 2 : 3</text>
  <text x="90" y="345" class="s">Parts = 2+3 = 5 → 1 part = 60 ÷ 5 = 12</text>
  <text x="90" y="378" class="s">Shares: 2×12 = £24 and 3×12 = £36</text>
</svg>
