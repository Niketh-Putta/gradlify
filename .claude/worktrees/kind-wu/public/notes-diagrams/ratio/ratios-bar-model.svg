<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Ratio bar model for 2:3">
  <defs>
    <style>
      .t{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="420" fill="#ffffff"/>

  <text x="40" y="60" class="t">Ratio bar model</text>
  <text x="40" y="92" class="s">Example: split a total in the ratio 2:3 (2 parts and 3 parts)</text>

  <text x="40" y="150" class="k">2 parts</text>
  <rect x="40" y="170" width="360" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <line x1="220" y1="170" x2="220" y2="240" stroke="#0284c7" stroke-width="3"/>
  <text x="130" y="214" class="t" text-anchor="middle">1 part</text>
  <text x="310" y="214" class="t" text-anchor="middle">1 part</text>

  <text x="40" y="295" class="k">3 parts</text>
  <rect x="40" y="315" width="540" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <line x1="220" y1="315" x2="220" y2="385" stroke="#16a34a" stroke-width="3"/>
  <line x1="400" y1="315" x2="400" y2="385" stroke="#16a34a" stroke-width="3"/>
  <text x="130" y="359" class="t" text-anchor="middle">1 part</text>
  <text x="310" y="359" class="t" text-anchor="middle">1 part</text>
  <text x="490" y="359" class="t" text-anchor="middle">1 part</text>

  <text x="640" y="220" class="s">Total parts = 2 + 3 = 5</text>
  <text x="640" y="250" class="s">Value of 1 part = total ÷ 5</text>
  <text x="640" y="280" class="s">Shares = (2×part) and (3×part)</text>
</svg>
