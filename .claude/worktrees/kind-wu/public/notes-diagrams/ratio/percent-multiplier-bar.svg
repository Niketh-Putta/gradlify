<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-label="Percentage multiplier idea for increase and decrease">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="60" class="t">Growth & decay: multipliers</text>
  <text x="40" y="92" class="s">Convert % change into a multiplier and apply repeatedly</text>

  <rect x="60" y="135" width="780" height="80" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="90" y="182" class="k">Increase by r%</text>
  <text x="320" y="182" class="s">multiplier = 1 + r/100</text>
  <text x="620" y="182" class="s">e.g. +5% → ×1.05</text>

  <rect x="60" y="240" width="780" height="80" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="90" y="287" class="k">Decrease by r%</text>
  <text x="320" y="287" class="s">multiplier = 1 − r/100</text>
  <text x="620" y="287" class="s">e.g. −15% → ×0.85</text>
</svg>
