<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Mutually exclusive vs independent events">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="56" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#111827">Mutually exclusive vs independent</text>
  <text x="40" y="86" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Different ideas: “can’t happen together” vs “doesn’t affect”.</text>

  <rect x="40" y="120" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Mutually exclusive panel -->
  <rect x="90" y="155" width="370" height="150" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="110" y="182" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Mutually exclusive</text>
  <text x="110" y="204" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">A and B cannot both happen</text>

  <circle cx="210" cy="250" r="48" fill="#10b981" opacity="0.18" stroke="#111827" stroke-width="3"/>
  <circle cx="340" cy="250" r="48" fill="#6366f1" opacity="0.18" stroke="#111827" stroke-width="3"/>
  <text x="200" y="255" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">A</text>
  <text x="332" y="255" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">B</text>

  <text x="110" y="292" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#111827">P(A ∩ B) = 0</text>

  <!-- Independent panel -->
  <rect x="490" y="155" width="390" height="150" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="510" y="182" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Independent</text>
  <text x="510" y="204" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">Knowing A happened doesn’t change P(B)</text>

  <circle cx="610" cy="250" r="52" fill="#10b981" opacity="0.18" stroke="#111827" stroke-width="3"/>
  <circle cx="705" cy="250" r="52" fill="#6366f1" opacity="0.18" stroke="#111827" stroke-width="3"/>
  <text x="600" y="255" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">A</text>
  <text x="697" y="255" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">B</text>

  <text x="510" y="292" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#111827">P(A ∩ B) = P(A) × P(B)</text>
</svg>
