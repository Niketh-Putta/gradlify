<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Interpolation vs extrapolation on a scatter graph">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Interpolation vs extrapolation</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Predictions inside the data range are more reliable.</text>

  <rect x="40" y="110" width="840" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Axes -->
  <line x1="100" y1="300" x2="820" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="100" y1="300" x2="100" y2="170" stroke="#111827" stroke-width="3"/>

  <!-- Data points -->
  <g fill="#6366f1">
    <circle cx="150" cy="275" r="5"/><circle cx="190" cy="260" r="5"/><circle cx="230" cy="248" r="5"/>
    <circle cx="270" cy="235" r="5"/><circle cx="310" cy="225" r="5"/><circle cx="350" cy="210" r="5"/>
    <circle cx="390" cy="205" r="5"/><circle cx="430" cy="195" r="5"/><circle cx="470" cy="185" r="5"/>
  </g>

  <!-- Best fit line -->
  <line x1="135" y1="285" x2="760" y2="135" stroke="#10b981" stroke-width="4"/>

  <!-- Range bracket -->
  <path d="M150 312 L470 312" stroke="#111827" stroke-width="3"/>
  <path d="M150 312 L150 322" stroke="#111827" stroke-width="3"/>
  <path d="M470 312 L470 322" stroke="#111827" stroke-width="3"/>
  <text x="260" y="346" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">data range</text>

  <!-- Interpolation point -->
  <circle cx="340" cy="218" r="7" fill="#f59e0b" stroke="#111827" stroke-width="2"/>
  <text x="360" y="222" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">interpolation</text>

  <!-- Extrapolation point -->
  <circle cx="700" cy="150" r="7" fill="#ef4444" stroke="#111827" stroke-width="2"/>
  <text x="720" y="154" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">extrapolation</text>

  <text x="520" y="292" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">(beyond the data range)</text>
</svg>
