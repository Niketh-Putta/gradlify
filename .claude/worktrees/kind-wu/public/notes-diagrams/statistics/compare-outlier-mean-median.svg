<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Outlier affects mean more than median">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Outliers: mean vs median</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">The median usually stays more stable when there’s an extreme value.</text>

  <rect x="40" y="110" width="840" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Number line -->
  <line x1="100" y1="260" x2="820" y2="260" stroke="#111827" stroke-width="4"/>

  <!-- Cluster points -->
  <g fill="#6366f1">
    <circle cx="180" cy="260" r="6"/>
    <circle cx="220" cy="260" r="6"/>
    <circle cx="260" cy="260" r="6"/>
    <circle cx="300" cy="260" r="6"/>
    <circle cx="340" cy="260" r="6"/>
  </g>

  <!-- Outlier -->
  <circle cx="730" cy="260" r="7" fill="#ef4444" stroke="#111827" stroke-width="2"/>
  <text x="744" y="264" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">outlier</text>

  <!-- Median marker -->
  <line x1="260" y1="220" x2="260" y2="300" stroke="#10b981" stroke-width="6"/>
  <text x="232" y="210" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#10b981">median</text>

  <!-- Mean marker shifted right -->
  <line x1="380" y1="225" x2="380" y2="295" stroke="#f59e0b" stroke-width="6"/>
  <text x="360" y="210" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#f59e0b">mean</text>

  <rect x="520" y="130" width="340" height="70" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="540" y="158" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">When comparing distributions with outliers,</text>
  <text x="540" y="180" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">median + IQR is often better than mean + range.</text>
</svg>
