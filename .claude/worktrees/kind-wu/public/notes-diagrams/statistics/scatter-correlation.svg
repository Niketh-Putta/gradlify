<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Scatter graphs showing correlation">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Scatter graphs: correlation</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Look for an overall trend, then draw a line of best fit.</text>

  <!-- Panel 1: positive -->
  <rect x="40" y="110" width="410" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="65" y="140" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Positive correlation</text>
  <line x1="90" y1="300" x2="420" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="300" x2="90" y2="170" stroke="#111827" stroke-width="3"/>
  <g fill="#6366f1">
    <circle cx="120" cy="270" r="5"/><circle cx="150" cy="255" r="5"/><circle cx="185" cy="240" r="5"/>
    <circle cx="215" cy="230" r="5"/><circle cx="250" cy="215" r="5"/><circle cx="285" cy="205" r="5"/>
    <circle cx="320" cy="190" r="5"/><circle cx="360" cy="180" r="5"/>
  </g>
  <line x1="110" y1="285" x2="400" y2="175" stroke="#10b981" stroke-width="4"/>

  <!-- Panel 2: negative -->
  <rect x="470" y="110" width="410" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="495" y="140" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Negative correlation</text>
  <line x1="520" y1="300" x2="850" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="520" y1="300" x2="520" y2="170" stroke="#111827" stroke-width="3"/>
  <g fill="#f59e0b">
    <circle cx="550" cy="180" r="5"/><circle cx="585" cy="195" r="5"/><circle cx="620" cy="210" r="5"/>
    <circle cx="655" cy="225" r="5"/><circle cx="690" cy="240" r="5"/><circle cx="725" cy="255" r="5"/>
    <circle cx="760" cy="270" r="5"/><circle cx="800" cy="285" r="5"/>
  </g>
  <line x1="540" y1="175" x2="830" y2="285" stroke="#10b981" stroke-width="4"/>
</svg>
