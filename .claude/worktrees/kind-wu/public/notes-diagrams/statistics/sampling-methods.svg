<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Sampling methods overview">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Sampling methods (GCSE)</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">A sample should represent the population fairly.</text>

  <!-- Flow -->
  <rect x="60" y="120" width="240" height="90" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="80" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Population</text>
  <text x="80" y="185" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">everyone you care about</text>

  <path d="M310 165 L360 165" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="370" y="120" width="240" height="90" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="390" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Sampling method</text>
  <text x="390" y="185" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">how you choose people/items</text>

  <path d="M620 165 L670 165" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="680" y="120" width="180" height="90" rx="16" fill="#d1fae5" stroke="#86efac"/>
  <text x="700" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Sample</text>
  <text x="700" y="185" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">small group you test</text>

  <!-- Three method cards -->
  <rect x="60" y="235" width="260" height="95" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="80" y="265" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Random</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">equal chance for everyone</text>

  <rect x="340" y="235" width="260" height="95" rx="16" fill="#fef3c7" stroke="#fde68a"/>
  <text x="360" y="265" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Stratified</text>
  <text x="360" y="290" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">pick proportionally from groups</text>

  <rect x="620" y="235" width="240" height="95" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="640" y="265" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Systematic</text>
  <text x="640" y="290" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">every nth item after a start</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="#111827"/>
    </marker>
  </defs>
</svg>
