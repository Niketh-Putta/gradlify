<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Solving a linear equation using a balance model" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .beam{stroke:#0f172a;stroke-width:4;stroke-linecap:round}
      .thin{stroke:#334155;stroke-width:2;stroke-linecap:round}
      .pan{fill:#ffffff;stroke:#0f172a;stroke-width:2}
      .xblk{fill:#eef2ff;stroke:#7c3aed;stroke-width:2}
      .num{fill:#f1f5f9;stroke:#334155;stroke-width:2}
      .note{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:12}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="56" class="t">Solving equations = keeping the balance</text>
  <text x="40" y="84" class="s">Whatever you do to one side, you must do to the other side.</text>

  <text x="80" y="130" class="eq">3x + 5 = 14</text>

  <!-- Balance (drawn level + symmetric so it makes sense visually) -->
  <g transform="translate(80,150)">
    <!-- stand -->
    <line x1="330" y1="210" x2="330" y2="310" class="beam"/>
    <line x1="260" y1="310" x2="400" y2="310" class="beam"/>

    <!-- beam -->
    <line x1="110" y1="210" x2="550" y2="210" class="beam"/>

    <!-- hangers -->
    <line x1="190" y1="210" x2="190" y2="250" class="thin"/>
    <line x1="470" y1="210" x2="470" y2="250" class="thin"/>

    <!-- pans -->
    <path d="M120 250 L260 250 L240 285 L140 285 Z" class="pan"/>
    <path d="M400 250 L540 250 L520 285 L420 285 Z" class="pan"/>

    <!-- left side blocks: x, x, x and +5 -->
    <rect x="135" y="160" width="48" height="48" rx="10" class="xblk"/>
    <text x="159" y="192" class="eq" text-anchor="middle">x</text>
    <rect x="190" y="160" width="48" height="48" rx="10" class="xblk"/>
    <text x="214" y="192" class="eq" text-anchor="middle">x</text>
    <rect x="245" y="160" width="48" height="48" rx="10" class="xblk"/>
    <text x="269" y="192" class="eq" text-anchor="middle">x</text>

    <rect x="170" y="295" width="80" height="46" rx="12" class="num"/>
    <text x="210" y="325" class="eq" text-anchor="middle">5</text>

    <!-- right side block: 14 -->
    <rect x="430" y="190" width="90" height="56" rx="12" class="num"/>
    <text x="475" y="225" class="eq" text-anchor="middle">14</text>
  </g>

  <!-- Steps (clear algebra, not dependent on the picture being "tilted") -->
  <g transform="translate(560,150)">
    <rect x="0" y="0" width="300" height="220" class="note"/>
    <text x="18" y="40" class="k">Step 1: subtract 5</text>
    <text x="18" y="74" class="eq">3x = 9</text>
    <text x="18" y="120" class="k">Step 2: divide by 3</text>
    <text x="18" y="154" class="eq">x = 3</text>
    <text x="18" y="196" class="s">(Because both sides stay equal.)</text>
  </g>
</svg>
