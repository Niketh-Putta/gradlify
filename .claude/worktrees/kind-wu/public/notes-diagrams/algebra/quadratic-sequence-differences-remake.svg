<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Quadratic sequences have constant second differences" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .h{fill:#ede9fe}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="56" class="t">Quadratic sequences: second differences</text>
  <text x="40" y="84" class="s">Constant second differences → nth term has an n² term.</text>

  <g transform="translate(60,115)">
    <text x="0" y="0" class="eq">Example: 2, 6, 12, 20, 30, ...</text>

    <!-- table: terms | 1st diff | 2nd diff -->
    <rect x="0" y="30" width="760" height="270" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <rect x="0" y="30" width="760" height="46" class="h"/>

    <line x1="260" y1="30" x2="260" y2="300" class="g"/>
    <line x1="520" y1="30" x2="520" y2="300" class="g"/>

    <text x="24" y="62" class="eq">terms</text>
    <text x="284" y="62" class="eq">diff 1</text>
    <text x="544" y="62" class="eq">diff 2</text>

    <!-- terms -->
    <text x="24" y="118" class="eq">2</text>
    <text x="24" y="158" class="eq">6</text>
    <text x="24" y="198" class="eq">12</text>
    <text x="24" y="238" class="eq">20</text>
    <text x="24" y="278" class="eq">30</text>

    <!-- first differences (between terms) -->
    <text x="284" y="158" class="eq">4</text>
    <text x="284" y="198" class="eq">6</text>
    <text x="284" y="238" class="eq">8</text>
    <text x="284" y="278" class="eq">10</text>

    <!-- second differences (between first diffs) -->
    <text x="544" y="198" class="eq">2</text>
    <text x="544" y="238" class="eq">2</text>
    <text x="544" y="278" class="eq">2</text>

    <text x="0" y="340" class="k">Second differences are constant (2), so a = 2 ÷ 2 = 1.</text>
  </g>
</svg>
