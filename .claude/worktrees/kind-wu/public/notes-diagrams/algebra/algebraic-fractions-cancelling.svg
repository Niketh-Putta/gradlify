<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Algebraic fractions: cancel factors not terms" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .good{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}
      .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:14}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Algebraic fractions: cancel factors (products)</text>
  <text x="40" y="92" class="s">You may cancel only when you have multiplication, not addition/subtraction.</text>

  <g transform="translate(70,150)">
    <rect x="0" y="0" width="760" height="120" class="good"/>
    <text x="24" y="50" class="k">Allowed:</text>
    <text x="24" y="90" class="eq">(x² − 4)/(x + 2) = (x+2)(x−2)/(x+2) = x − 2</text>

    <rect x="0" y="155" width="760" height="120" class="bad"/>
    <text x="24" y="200" class="k">Not allowed:</text>
    <text x="24" y="245" class="eq">(x + 2)/x  ≠  2</text>

    <text x="0" y="330" class="k">Remember restrictions:</text>
    <text x="250" y="330" class="eq">denominator ≠ 0</text>
  </g>
</svg>
