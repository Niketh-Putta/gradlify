<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Quadratic sequences have constant second differences" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .h{fill:#ede9fe}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Quadratic sequences: second differences</text>
  <text x="40" y="92" class="s">Constant second differences → nth term has an n² term.</text>

  <g transform="translate(70,140)">
    <text x="0" y="0" class="eq">Example: 2, 6, 12, 20, 30, ...</text>

    <rect x="0" y="35" width="760" height="250" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <rect x="0" y="35" width="760" height="50" class="h"/>
    <line x1="180" y1="35" x2="180" y2="285" class="g"/>
    <line x1="360" y1="35" x2="360" y2="285" class="g"/>
    <line x1="540" y1="35" x2="540" y2="285" class="g"/>

    <text x="25" y="70" class="eq">terms</text>
    <text x="205" y="70" class="eq">diff 1</text>
    <text x="385" y="70" class="eq">diff 1</text>
    <text x="565" y="70" class="eq">diff 1</text>

    <text x="25" y="125" class="eq">2</text>
    <text x="25" y="165" class="eq">6</text>
    <text x="25" y="205" class="eq">12</text>
    <text x="25" y="245" class="eq">20</text>
    <text x="25" y="285" class="eq">30</text>

    <text x="205" y="165" class="eq">4</text>
    <text x="205" y="205" class="eq">6</text>
    <text x="205" y="245" class="eq">8</text>
    <text x="205" y="285" class="eq">10</text>

    <text x="385" y="205" class="eq">2</text>
    <text x="385" y="245" class="eq">2</text>
    <text x="385" y="285" class="eq">2</text>

    <text x="0" y="330" class="k">Second differences are constant (2), so a = 2/2 = 1.</text>
  </g>
</svg>
