<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Function machine: input, rule, output, inverse" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .bx{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:18}
      .arr{stroke:#0f172a;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Function notation (function machine)</text>
  <text x="40" y="92" class="s">Input x goes through a rule to produce output f(x).</text>

  <g transform="translate(70,155)">
    <text x="0" y="40" class="k">Input</text>
    <text x="0" y="80" class="eq">x = 4</text>

    <line x1="140" y1="65" x2="290" y2="65" class="arr"/>

    <rect x="300" y="20" width="260" height="90" class="bx"/>
    <text x="330" y="62" class="eq">f(x) = 2x + 3</text>

    <line x1="580" y1="65" x2="670" y2="65" class="arr"/>

    <text x="690" y="40" class="k">Output</text>
    <text x="690" y="80" class="eq">f(4) = 11</text>

    <text x="0" y="165" class="k">Inverse undoes the rule:</text>
    <text x="0" y="205" class="eq">f⁻¹(x) = (x − 3)/2</text>
    <text x="0" y="245" class="s">Apply f then f⁻¹ and you get back the input.</text>
  </g>
</svg>
