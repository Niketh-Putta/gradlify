<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Unit price comparison table">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .cell{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Best buys: compare unit prices</text>
  <text x="40" y="92" class="s">Make the quantities the same (per 100g, per litre, per item…)</text>

  <g transform="translate(60,140)">
    <rect x="0" y="0" width="780" height="60" class="cell" fill="#f1f5f9"/>
    <rect x="0" y="60" width="780" height="60" class="cell"/>
    <rect x="0" y="120" width="780" height="60" class="cell"/>
    <line x1="260" y1="0" x2="260" y2="180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="520" y1="0" x2="520" y2="180" stroke="#cbd5e1" stroke-width="2"/>

    <text x="20" y="38" class="k">Option</text>
    <text x="280" y="38" class="k">Price</text>
    <text x="540" y="38" class="k">Quantity</text>
    <text x="650" y="38" class="k">Unit price</text>

    <text x="20" y="98" class="s">A</text>
    <text x="280" y="98" class="s">£2.50</text>
    <text x="540" y="98" class="s">500 g</text>
    <text x="650" y="98" class="s">£0.50 per 100 g</text>

    <text x="20" y="158" class="s">B</text>
    <text x="280" y="158" class="s">£3.00</text>
    <text x="540" y="158" class="s">750 g</text>
    <text x="650" y="158" class="s">£0.40 per 100 g</text>
  </g>

  <text x="40" y="360" class="s">Lower unit price = better value</text>
</svg>
