<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="Simplifying a ratio by dividing by the highest common factor">
  <defs>
    <style>
      .t{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="60" class="t">Simplifying a ratio</text>
  <text x="40" y="92" class="s">Divide every part by the same number (usually the HCF)</text>

  <rect x="40" y="135" width="820" height="175" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="90" y="205" class="k">Example</text>
  <text x="90" y="245" class="s">12 : 18</text>

  <text x="360" y="212" class="s">HCF = 6</text>
  <line x1="340" y1="230" x2="700" y2="230" stroke="#cbd5e1" stroke-width="2"/>
  <text x="360" y="270" class="s">12 ÷ 6 : 18 ÷ 6</text>

  <text x="760" y="242" class="m" text-anchor="middle">2 : 3</text>
</svg>
