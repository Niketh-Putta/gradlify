<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Exponential growth and decay curves">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .axis{stroke:#0f172a;stroke-width:2}
      .grid{stroke:#e2e8f0;stroke-width:1}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Repeated percentage change</text>
  <text x="40" y="92" class="s">Growth rises over time; decay falls over time</text>

  <g transform="translate(70,110)">
    <rect x="0" y="0" width="520" height="270" fill="#ffffff" stroke="#e2e8f0"/>
    <g>
      <line x1="104" y1="0" x2="104" y2="270" class="grid"/>
      <line x1="208" y1="0" x2="208" y2="270" class="grid"/>
      <line x1="312" y1="0" x2="312" y2="270" class="grid"/>
      <line x1="416" y1="0" x2="416" y2="270" class="grid"/>
      <line x1="0" y1="54" x2="520" y2="54" class="grid"/>
      <line x1="0" y1="108" x2="520" y2="108" class="grid"/>
      <line x1="0" y1="162" x2="520" y2="162" class="grid"/>
      <line x1="0" y1="216" x2="520" y2="216" class="grid"/>
    </g>
    <line x1="0" y1="270" x2="520" y2="270" class="axis"/>
    <line x1="0" y1="270" x2="0" y2="0" class="axis"/>
    <path d="M 0 240 C 120 220, 240 170, 520 30" fill="none" stroke="#16a34a" stroke-width="4"/>
    <path d="M 0 40 C 140 90, 280 160, 520 240" fill="none" stroke="#ef4444" stroke-width="4"/>
    <text x="340" y="70" class="s" fill="#16a34a">growth</text>
    <text x="360" y="230" class="s" fill="#ef4444">decay</text>
  </g>

  <text x="640" y="170" class="s">Model:</text>
  <text x="640" y="205" class="s">N = N₀ × (multiplier)ᵗ</text>
  <text x="640" y="238" class="s">multiplier = 1 ± r</text>
  <text x="640" y="271" class="s">(r as a decimal)</text>
</svg>
