<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Inverse proportion graph y equals k over x forms a decreasing curve">
  <defs>
    <style>
      .t{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .axis{stroke:#0f172a;stroke-width:2}
      .grid{stroke:#e2e8f0;stroke-width:1}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Inverse proportion: y ∝ 1/x</text>
  <text x="40" y="92" class="s">Graph is a curve: as x increases, y decreases</text>

  <g transform="translate(70,110)">
    <rect x="0" y="0" width="520" height="270" fill="#ffffff" stroke="#e2e8f0"/>
    <g>
      <line x1="104" y1="0" x2="104" y2="270" class="grid"/>
      <line x1="208" y1="0" x2="208" y2="270" class="grid"/>
      <line x1="312" y1="0" x2="312" y2="270" class="grid"/>
      <line x1="416" y1="0" x2="416" y2="270" class="grid"/>
      <line x1="0" y1="54" x2="520" y2="54" class="grid"/>
      <line x1="0" y1="108" x2="520" y2="108" class="grid"/>
      <line x1="0" y1="162" x2="520" y2="162" class="grid"/>
      <line x1="0" y1="216" x2="520" y2="216" class="grid"/>
    </g>
    <line x1="0" y1="270" x2="520" y2="270" class="axis"/>
    <line x1="0" y1="270" x2="0" y2="0" class="axis"/>
    <!-- curve (simple bezier) -->
    <path d="M 30 25 C 120 90, 220 150, 520 240" fill="none" stroke="#f97316" stroke-width="4"/>
    <text x="360" y="80" class="s" fill="#f97316">y = k/x</text>
  </g>

  <text x="640" y="170" class="s">Key feature:</text>
  <text x="640" y="205" class="s">• decreasing curve</text>
  <text x="640" y="238" class="s">• k is constant: x×y = k</text>
</svg>
