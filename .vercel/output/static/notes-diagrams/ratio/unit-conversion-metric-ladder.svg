<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Metric unit conversion ladder with km m cm mm">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#94a3b8;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Metric ladder (length)</text>
  <text x="40" y="92" class="s">Moving right makes the number bigger (multiply). Moving left makes it smaller (divide).</text>

  <g transform="translate(80,150)">
    <rect x="0" y="0" width="130" height="70" rx="14" class="box"/>
    <rect x="160" y="0" width="130" height="70" rx="14" class="box"/>
    <rect x="320" y="0" width="130" height="70" rx="14" class="box"/>
    <rect x="480" y="0" width="130" height="70" rx="14" class="box"/>
    <text x="65" y="44" class="k" text-anchor="middle">km</text>
    <text x="225" y="44" class="k" text-anchor="middle">m</text>
    <text x="385" y="44" class="k" text-anchor="middle">cm</text>
    <text x="545" y="44" class="k" text-anchor="middle">mm</text>

    <text x="120" y="110" class="s" text-anchor="middle">×1000</text>
    <text x="280" y="110" class="s" text-anchor="middle">×100</text>
    <text x="440" y="110" class="s" text-anchor="middle">×10</text>

    <line x1="130" y1="35" x2="160" y2="35" stroke="#64748b" stroke-width="2"/>
    <line x1="290" y1="35" x2="320" y2="35" stroke="#64748b" stroke-width="2"/>
    <line x1="450" y1="35" x2="480" y2="35" stroke="#64748b" stroke-width="2"/>
  </g>

  <text x="40" y="355" class="s">Example: 3.5 km → 3500 m (×1000)</text>
</svg>
