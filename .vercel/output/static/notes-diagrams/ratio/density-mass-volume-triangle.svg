<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Density mass volume formula triangle">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Density, mass and volume</text>
  <text x="40" y="92" class="s">Use D = M ÷ V (triangle helps rearrange)</text>

  <g transform="translate(150,120)">
    <polygon points="200,0 0,300 400,300" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <!-- Proper formula-triangle sectioning: top vs bottom, then bottom split -->
    <line x1="100" y1="150" x2="300" y2="150" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="200" y1="150" x2="200" y2="300" stroke="#cbd5e1" stroke-width="2"/>
    <text x="200" y="70" class="k" text-anchor="middle">M</text>
    <text x="120" y="245" class="k" text-anchor="middle">D</text>
    <text x="280" y="245" class="k" text-anchor="middle">V</text>
  </g>

  <g transform="translate(590,150)">
    <rect x="0" y="0" width="270" height="210" rx="18" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="20" y="50" class="s">Rearrangements:</text>
    <text x="20" y="92" class="s">• M = D × V</text>
    <text x="20" y="126" class="s">• D = M ÷ V</text>
    <text x="20" y="160" class="s">• V = M ÷ D</text>
  </g>
</svg>
