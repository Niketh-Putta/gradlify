<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Conditional probability restricts the sample space">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="56" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#111827">Conditional probability: restrict the sample space</text>
  <text x="40" y="86" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">P(A | B) means: “assuming B happened”.</text>

  <rect x="40" y="120" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- universe -->
  <rect x="90" y="150" width="420" height="150" rx="14" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="100" y="170" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">All outcomes</text>

  <!-- B region -->
  <rect x="140" y="190" width="320" height="90" rx="14" fill="#6366f1" opacity="0.18" stroke="#111827" stroke-width="2"/>
  <text x="152" y="214" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">B</text>

  <!-- A∩B region -->
  <rect x="250" y="210" width="110" height="50" rx="12" fill="#f59e0b" opacity="0.35" stroke="#111827" stroke-width="2"/>
  <text x="262" y="242" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">A ∩ B</text>

  <!-- formula card -->
  <rect x="550" y="165" width="330" height="130" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="570" y="195" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="15" font-weight="700" fill="#111827">Key idea</text>
  <text x="570" y="220" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">Given B, ignore everything outside B.</text>
  <text x="570" y="245" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#111827">P(A | B) = P(A ∩ B) / P(B)</text>
  <text x="570" y="270" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">Numerator: inside both A and B.</text>
</svg>
