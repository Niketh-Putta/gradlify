<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Relative frequency approaches theoretical probability as trials increase">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="56" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#111827">Experimental probability (relative frequency)</text>
  <text x="40" y="86" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">More trials usually makes the estimate more stable.</text>

  <rect x="40" y="120" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- axes -->
  <line x1="110" y1="290" x2="820" y2="290" stroke="#111827" stroke-width="3"/>
  <line x1="110" y1="290" x2="110" y2="150" stroke="#111827" stroke-width="3"/>

  <text x="114" y="146" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">relative frequency</text>
  <text x="780" y="320" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">trials</text>

  <!-- theoretical line at 0.5 -->
  <line x1="110" y1="220" x2="820" y2="220" stroke="#10b981" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="128" y="214" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="700" fill="#10b981">theoretical (0.5)</text>

  <!-- wiggly convergence line -->
  <path d="M120 180 L170 245 L220 205 L270 235 L320 215 L370 228 L420 218 L470 223 L520 219 L570 221 L620 220 L670 221 L720 220 L800 220" fill="none" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>

  <circle cx="170" cy="245" r="5" fill="#6366f1"/>
  <circle cx="320" cy="215" r="5" fill="#6366f1"/>
  <circle cx="520" cy="219" r="5" fill="#6366f1"/>
  <circle cx="720" cy="220" r="5" fill="#6366f1"/>

  <rect x="560" y="150" width="300" height="60" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="580" y="176" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">Relative frequency = successes ÷ trials</text>
  <text x="580" y="196" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">It can fluctuate a lot at first.</text>
</svg>
