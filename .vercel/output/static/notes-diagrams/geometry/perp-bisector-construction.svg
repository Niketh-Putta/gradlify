<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="-50 -50 950 570" role="img" aria-label="Perpendicular bisector construction with compasses arcs" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:3;fill:none;opacity:.85}
      .line{stroke:#0f172a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Construction: perpendicular bisector of AB</text>
  <text x="40" y="92" class="s">Arcs must cross above and below the line; leave them visible.</text>

  <g transform="translate(120,140)">
    <line x1="60" y1="140" x2="540" y2="140" class="line"/>
    <circle cx="60" cy="140" r="5" fill="#0f172a"/>
    <circle cx="540" cy="140" r="5" fill="#0f172a"/>
    <text x="50" y="175" class="k">A</text>
    <text x="530" y="175" class="k">B</text>

    <!-- arcs from A and B with same radius -->
    <circle cx="60" cy="140" r="180" class="accent"/>
    <circle cx="540" cy="140" r="180" class="accent"/>

    <!-- perpendicular bisector -->
    <line x1="300" y1="-10" x2="300" y2="290" stroke="#16a34a" stroke-width="4"/>
    <text x="320" y="10" class="k">perp bisector</text>
  </g>
</svg>
