<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Cyclic quadrilateral: opposite angles sum to 180" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Cyclic quadrilateral: opposite angles add to 180°</text>
  <text x="40" y="92" class="s">If all 4 vertices lie on the circle, it’s cyclic.</text>

  <g transform="translate(190,120)">
    <circle cx="200" cy="160" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <polygon points="200,40 320,170 200,300 80,170" fill="none" stroke="#7c3aed" stroke-width="4"/>
    <text x="210" y="80" class="k">x°</text>
    <text x="205" y="270" class="k">(180−x)°</text>
  </g>

  <g transform="translate(620,180)">
    <text x="0" y="0" class="m">x + (180−x) = 180°</text>
  </g>
</svg>
