<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Congruence criteria SSS SAS ASA RHS" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Congruence: the four GCSE tests</text>
  <text x="40" y="92" class="s">Congruent means exactly the same size and shape.</text>

  <g transform="translate(60,130)">
    <rect x="0" y="0" width="780" height="230" class="box" rx="16"/>
    <text x="30" y="65" class="m">SSS</text>
    <text x="120" y="65" class="k">three sides equal</text>

    <text x="30" y="115" class="m">SAS</text>
    <text x="120" y="115" class="k">two sides + included angle</text>

    <text x="30" y="165" class="m">ASA</text>
    <text x="120" y="165" class="k">two angles + included side</text>

    <text x="30" y="215" class="m">RHS</text>
    <text x="120" y="215" class="k">right angle + hypotenuse + side</text>
  </g>
</svg>
