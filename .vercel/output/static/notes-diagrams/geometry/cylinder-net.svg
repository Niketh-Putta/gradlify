<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Cylinder net: rectangle plus two circles" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .shape{fill:#f8fafc;stroke:#0f172a;stroke-width:3}
      .accent{stroke:#7c3aed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Cylinder surface area: use the net</text>
  <text x="40" y="92" class="s">Curved surface becomes a rectangle: width = circumference = 2πr.</text>

  <g transform="translate(120,140)">
    <rect x="260" y="40" width="420" height="180" class="shape" rx="10"/>
    <circle cx="200" cy="130" r="90" class="shape"/>
    <circle cx="760" cy="130" r="90" class="shape"/>

    <line x1="260" y1="235" x2="680" y2="235" class="accent"/>
    <text x="470" y="270" class="k" text-anchor="middle">width = 2πr</text>

    <line x1="690" y1="40" x2="690" y2="220" class="accent"/>
    <text x="710" y="135" class="k">height = h</text>

    <text x="200" y="245" class="m" text-anchor="middle">area = πr²</text>
    <text x="760" y="245" class="m" text-anchor="middle">area = πr²</text>
  </g>
</svg>
