<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Sine and cosine rules summary" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:800 44px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .h{font:800 30px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:600 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .m{font:900 28px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .tri{stroke:#0f172a;stroke-width:6;fill:none;stroke-linejoin:round;stroke-linecap:round}
      .pill{fill:#ffffff;stroke:#e2e8f0;stroke-width:3}
      .lab{font:900 26px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#7c3aed}
      .v{font:800 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:3}
      .rule{font:900 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>

  <rect width="1200" height="520" fill="#ffffff"/>

  <text x="600" y="64" class="t" text-anchor="middle">Sine Rule and Cosine Rule</text>
  <text x="70" y="112" class="s">Non-right triangles: label carefully (a ↔ A, b ↔ B, c ↔ C).</text>

  <!-- Left: labelled triangle -->
  <g transform="translate(70,145)">
    <path d="M110 320 L450 340 L330 90 Z" class="tri"/>

    <!-- vertices -->
    <text x="88" y="352" class="v">A</text>
    <text x="462" y="370" class="v">B</text>
    <text x="326" y="78" class="v">C</text>

    <!-- side labels (placed off edges) -->
    <circle cx="280" cy="392" r="26" class="pill"/>
    <text x="280" y="401" class="lab" text-anchor="middle">c</text>

    <circle cx="494" cy="230" r="26" class="pill"/>
    <text x="494" y="239" class="lab" text-anchor="middle">a</text>

    <circle cx="96" cy="230" r="26" class="pill"/>
    <text x="96" y="239" class="lab" text-anchor="middle">b</text>

    <!-- angle labels (no arcs) -->
    <circle cx="160" cy="300" r="24" class="pill"/>
    <text x="160" y="308" class="lab" text-anchor="middle">A</text>

    <circle cx="375" cy="310" r="24" class="pill"/>
    <text x="375" y="318" class="lab" text-anchor="middle">B</text>

    <circle cx="330" cy="132" r="24" class="pill"/>
    <text x="330" y="140" class="lab" text-anchor="middle">C</text>
  </g>

  <!-- Right: formula blocks -->
  <g transform="translate(620,145)">
    <rect x="0" y="0" width="510" height="160" rx="18" class="box"/>
    <text x="24" y="52" class="h">Sine Rule</text>
    <text x="24" y="104" class="m">
      <tspan x="24" dy="0">a / sin(A) = b / sin(B) = c / sin(C)</tspan>
    </text>

    <rect x="0" y="190" width="510" height="180" rx="18" class="box"/>
    <text x="24" y="242" class="h">Cosine Rule</text>
    <text x="24" y="294" class="m">
      <tspan x="24" dy="0">a² = b² + c² − 2bc cos(A)</tspan>
    </text>
    <text x="24" y="340" class="s">
      <tspan x="24" dy="0">Angle A is between sides b and c.</tspan>
    </text>
  </g>
</svg>
