<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Similar shapes: k, k squared, k cubed" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .a{fill:#a78bfa;opacity:.25;stroke:#7c3aed;stroke-width:3}
      .b{fill:#86efac;opacity:.22;stroke:#16a34a;stroke-width:3}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Similar shapes: what happens to length, area, volume?</text>
  <text x="40" y="92" class="s">If the linear scale factor is k, areas scale by k² and volumes by k³.</text>

  <g transform="translate(90,140)">
    <polygon points="0,210 160,210 60,50" class="a"/>
    <polygon points="260,210 500,210 350,0" class="b"/>
    <text x="40" y="245" class="k">small</text>
    <text x="340" y="245" class="k">large</text>
  </g>

  <g transform="translate(520,150)">
    <rect x="0" y="0" width="330" height="190" class="box" rx="16"/>
    <text x="22" y="55" class="m">length: × k</text>
    <text x="22" y="100" class="m">area: × k²</text>
    <text x="22" y="145" class="m">volume: × k³</text>
  </g>
</svg>
