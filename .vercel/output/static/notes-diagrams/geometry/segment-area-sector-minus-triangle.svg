<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Segment area = sector area minus triangle area" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .seg{fill:#86efac;opacity:.25;stroke:#16a34a;stroke-width:3}
      .sector{fill:#a78bfa;opacity:.22;stroke:#7c3aed;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Segment area = sector − triangle</text>
  <text x="40" y="92" class="s">Find sector using θ/360, then subtract triangle area with ½ab sinC.</text>

  <g transform="translate(160,120)">
    <circle cx="200" cy="200" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <path d="M 200 200 L 340 200 A 140 140 0 0 1 250 80 Z" class="sector"/>
    <path d="M 340 200 A 140 140 0 0 1 250 80 L 340 200 Z" class="seg"/>
    <circle cx="200" cy="200" r="4" fill="#0f172a"/>

    <text x="380" y="130" class="m">segment = sector − triangle</text>
  </g>
</svg>
