<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Vector addition head-to-tail" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Vectors: add components (or head-to-tail)</text>
  <text x="40" y="92" class="s">\(\begin{pmatrix}a\\b\end{pmatrix}+\begin{pmatrix}c\\d\end{pmatrix}=\begin{pmatrix}a+c\\b+d\end{pmatrix}\)</text>

  <g transform="translate(140,130)">
    <!-- axes -->
    <line x1="0" y1="240" x2="420" y2="240" stroke="#0f172a" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="240" stroke="#0f172a" stroke-width="3"/>

    <!-- v -->
    <line x1="0" y1="240" x2="180" y2="120" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="190" y="120" class="k">v</text>

    <!-- w from head of v -->
    <line x1="180" y1="120" x2="320" y2="60" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="330" y="60" class="k">w</text>

    <!-- result -->
    <line x1="0" y1="240" x2="320" y2="60" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="330" y="90" class="k">v + w</text>
  </g>

  <g transform="translate(610,170)">
    <text x="0" y="0" class="k">Component method</text>
    <text x="0" y="40" class="m">x: add across</text>
    <text x="0" y="75" class="m">y: add down</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="currentColor" />
    </marker>
  </defs>
</svg>
