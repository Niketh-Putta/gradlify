<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Isosceles triangle: equal sides mean equal base angles" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .lab{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#7c3aed}
      .shape{fill:#f8fafc;stroke:#0f172a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Isosceles triangle: equal sides → equal angles</text>
  <text x="40" y="92" class="s">Mark equal sides (ticks) to justify equal angles.</text>

  <g transform="translate(220,120)">
    <polygon points="200,0 40,260 360,260" class="shape"/>
    <line x1="140" y1="140" x2="170" y2="160" stroke="#0f172a" stroke-width="3"/>
    <line x1="260" y1="140" x2="230" y2="160" stroke="#0f172a" stroke-width="3"/>
    <text x="120" y="250" class="lab">x°</text>
    <text x="280" y="250" class="lab">x°</text>
    <text x="200" y="80" class="k" text-anchor="middle">(180 − 2x)°</text>
  </g>
</svg>
