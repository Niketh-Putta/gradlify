<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Bearings measured clockwise from North" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:4;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Bearings: always clockwise from North</text>
  <text x="40" y="92" class="s">Write as three figures: 045° not 45°.</text>

  <g transform="translate(180,120)">
    <circle cx="200" cy="160" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <line x1="200" y1="20" x2="200" y2="300" stroke="#0f172a" stroke-width="3"/>
    <line x1="60" y1="160" x2="340" y2="160" stroke="#0f172a" stroke-width="3"/>

    <text x="200" y="14" class="k" text-anchor="middle">N</text>
    <text x="200" y="338" class="k" text-anchor="middle">S</text>
    <text x="46" y="166" class="k">W</text>
    <text x="352" y="166" class="k">E</text>

    <!-- bearing ray example -->
    <line x1="200" y1="160" x2="320" y2="230" stroke="#7c3aed" stroke-width="4"/>
    <path d="M 200 50 A 110 110 0 0 1 270 205" class="accent"/>
    <text x="242" y="125" class="m">120°</text>
  </g>

  <g transform="translate(610,160)">
    <text x="0" y="0" class="k">Back bearing</text>
    <text x="0" y="35" class="s">Add or subtract 180°</text>
    <text x="0" y="70" class="m">065° → 245°</text>
  </g>
</svg>
