<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Sine rule diagram" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 28px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:800 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
      .tri{stroke:#0f172a;stroke-width:5;fill:none;stroke-linejoin:round;stroke-linecap:round}
      .pill{fill:#ffffff;stroke:#e2e8f0;stroke-width:2}
      .lab{font:800 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#7c3aed}
      .v{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>

  <rect width="900" height="500" fill="#ffffff"/>
  <text x="40" y="62" class="t">Sine rule</text>
  <text x="40" y="96" class="s">Match each side with its opposite angle (a ↔ A, b ↔ B, c ↔ C).</text>

  <!-- Triangle (large and clean) -->
  <g transform="translate(70,110)">
    <!-- Triangle points: A(70,320), B(430,330), C(300,80) -->
    <path d="M70 320 L430 330 L300 80 Z" class="tri"/>

    <!-- labels only (no curved marks) -->

    <!-- Vertex labels -->
    <text x="52" y="348" class="v">A</text>
    <text x="444" y="358" class="v">B</text>
    <text x="296" y="70" class="v">C</text>

    <!-- Side labels placed off the lines -->
    <circle cx="250" cy="372" r="18" class="pill"/>
    <text x="250" y="378" class="lab" text-anchor="middle">c</text>

    <circle cx="472" cy="210" r="18" class="pill"/>
    <text x="472" y="216" class="lab" text-anchor="middle">a</text>

    <circle cx="86" cy="210" r="18" class="pill"/>
    <text x="86" y="216" class="lab" text-anchor="middle">b</text>

    <!-- Angle labels (near arcs) -->
    <circle cx="148" cy="266" r="18" class="pill"/>
    <text x="148" y="272" class="lab" text-anchor="middle">A</text>

    <circle cx="338" cy="286" r="18" class="pill"/>
    <text x="338" y="292" class="lab" text-anchor="middle">B</text>

    <circle cx="300" cy="140" r="18" class="pill"/>
    <text x="300" y="146" class="lab" text-anchor="middle">C</text>
  </g>

  <!-- Formula box (wrapped, never clips) -->
  <g transform="translate(540,150)">
    <rect x="0" y="0" width="320" height="250" rx="18" class="box"/>
    <text x="20" y="46" class="k">Formula</text>
    <text x="20" y="84" class="m">
      <tspan x="20" dy="0">a / sin(A) = b / sin(B)</tspan>
      <tspan x="20" dy="28">= c / sin(C)</tspan>
    </text>

    <text x="20" y="156" class="k">Tip</text>
    <text x="20" y="188" class="s">
      <tspan x="20" dy="0">Keep the opposite pairs together.</tspan>
      <tspan x="20" dy="22">Don’t mix letters across the equals sign.</tspan>
    </text>
  </g>
</svg>
