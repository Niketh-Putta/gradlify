<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Loci examples: fixed distance from a point and equidistant from two points" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:4;fill:none}
      .line{stroke:#0f172a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Loci: two patterns GCSE repeats</text>
  <text x="40" y="92" class="s">Fixed distance from a point → circle; equidistant from A and B → perpendicular bisector.</text>

  <g transform="translate(140,130)">
    <circle cx="160" cy="170" r="110" class="accent"/>
    <circle cx="160" cy="170" r="4" fill="#0f172a"/>
    <text x="130" y="300" class="k">All points 3 cm from P</text>
    <text x="170" y="175" class="k">P</text>

    <line x1="430" y1="170" x2="720" y2="170" class="line"/>
    <circle cx="430" cy="170" r="4" fill="#0f172a"/>
    <circle cx="720" cy="170" r="4" fill="#0f172a"/>
    <text x="420" y="205" class="k">A</text>
    <text x="710" y="205" class="k">B</text>
    <line x1="575" y1="60" x2="575" y2="280" stroke="#16a34a" stroke-width="4"/>
    <text x="515" y="300" class="k">Equidistant from A and B</text>
  </g>
</svg>
