<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Algebraic fractions: cancel factors not terms (refined white)" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <style>
      .title{font:800 28px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .sub{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .chip{font:700 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .label{font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;letter-spacing:0.7px}
      .labelGood{fill:#166534}
      .labelBad{fill:#7f1d1d}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .eqMuted{fill:#334155}
      .body{font:500 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .hint{font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

  <!-- Outer frame -->
  <g filter="url(#shadow)">
    <rect x="24" y="22" width="852" height="436" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  </g>

  <!-- Header -->
  <g transform="translate(56,64)">
    <text x="0" y="0" class="title">Algebraic Fractions</text>
    <text x="0" y="26" class="sub">Cancel factors (products), not terms (sums).</text>

    <!-- Chips (kept subtle) -->
    <g transform="translate(540,-16)">
      <rect x="0" y="0" width="132" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="14" y="19" class="chip">Factorise first</text>
    </g>
    <g transform="translate(680,-16)">
      <rect x="0" y="0" width="152" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="14" y="19" class="chip">State restrictions</text>
    </g>
  </g>

  <!-- Content cards -->
  <g transform="translate(56,112)">
    <!-- Allowed card -->
    <rect x="0" y="0" width="408" height="236" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="18" y="18" width="84" height="24" rx="12" fill="#dcfce7"/>
    <text x="32" y="35" class="label labelGood">ALLOWED</text>

    <text x="24" y="80" class="eq">(x² − 4)/(x + 2)</text>
    <text x="24" y="114" class="eq eqMuted">= (x+2)(x−2)/(x+2)</text>
    <text x="24" y="148" class="eq">= x − 2</text>

    <text x="24" y="178" class="hint">Why this is OK:</text>
    <text x="24" y="200" class="body">(x+2) is a common factor, so it cancels safely.</text>

    <!-- Not allowed card -->
    <rect x="436" y="0" width="408" height="236" rx="16" fill="#ffffff" stroke="#fecaca" stroke-width="2"/>
    <rect x="454" y="18" width="112" height="24" rx="12" fill="#fee2e2"/>
    <text x="468" y="35" class="label labelBad">NOT ALLOWED</text>

    <text x="460" y="90" class="eq">(x + 2)/x  ≠  2</text>
    <text x="460" y="128" class="hint">Why not:</text>
    <text x="460" y="150" class="body">You cannot cancel “x” across a plus.</text>
    <text x="460" y="172" class="body">x + 2 is a term, not a factor.</text>

    <!-- Restrictions banner -->
    <rect x="0" y="254" width="844" height="104" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <g transform="translate(20,270)">
      <rect x="0" y="0" width="112" height="26" rx="13" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="14" y="18" class="label" fill="#0f172a">RESTRICTIONS</text>

      <text x="0" y="52" class="body">Denominators cannot be zero.</text>
      <text x="0" y="72" class="body">Use the original denominator to find values not allowed.</text>
      <text x="0" y="92" class="eq">Example: x + 2 ≠ 0  ⇒  x ≠ −2</text>
    </g>
  </g>
</svg>
