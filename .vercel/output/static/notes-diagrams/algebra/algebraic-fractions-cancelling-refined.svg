<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Algebraic fractions: cancel factors not terms (refined)" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1224"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.00"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title{font:800 28px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#e2e8f0;letter-spacing:0.2px}
      .sub{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#94a3b8}
      .label{font:800 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#cbd5e1;letter-spacing:0.6px}
      .labelGood{fill:#86efac}
      .labelBad{fill:#fca5a5}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#e2e8f0}
      .eqMuted{fill:#cbd5e1}
      .tiny{font:500 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#94a3b8}
      .chip{font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0b1224}
    </style>
  </defs>

  <!-- Background card (self-contained style) -->
  <rect x="0" y="0" width="900" height="480" fill="url(#bg)"/>

  <!-- Main frame -->
  <g filter="url(#shadow)">
    <rect x="24" y="22" width="852" height="436" rx="20" fill="#0b1224" stroke="#334155" stroke-opacity="0.65" stroke-width="2"/>
    <rect x="24" y="22" width="852" height="436" rx="20" fill="url(#sheen)"/>
  </g>

  <!-- Header -->
  <g transform="translate(56,60)">
    <text x="0" y="0" class="title">Algebraic Fractions</text>
    <text x="0" y="26" class="sub">Cancel factors (products), not terms (sums).</text>

    <!-- small chips -->
    <g transform="translate(520,-14)">
      <rect x="0" y="0" width="150" height="28" rx="14" fill="#e2e8f0" fill-opacity="0.10" stroke="#475569" stroke-opacity="0.55"/>
      <text x="14" y="19" class="tiny">Factorise first</text>
    </g>
    <g transform="translate(680,-14)">
      <rect x="0" y="0" width="152" height="28" rx="14" fill="#e2e8f0" fill-opacity="0.10" stroke="#475569" stroke-opacity="0.55"/>
      <text x="14" y="19" class="tiny">State restrictions</text>
    </g>
  </g>

  <!-- Two cards -->
  <g transform="translate(56,120)">
    <!-- Allowed card -->
    <rect x="0" y="0" width="412" height="250" rx="18" fill="#0f172a" stroke="#22c55e" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="18" y="18" width="88" height="24" rx="12" fill="#22c55e" fill-opacity="0.18"/>
    <text x="30" y="35" class="label labelGood">ALLOWED</text>

    <text x="24" y="78" class="eq">(x² − 4)/(x + 2)</text>
    <text x="24" y="114" class="eq eqMuted">= (x+2)(x−2)/(x+2)</text>
    <text x="24" y="150" class="eq">= x − 2</text>

    <text x="24" y="190" class="tiny">Reason: (x+2) is a common factor.</text>

    <!-- Not allowed card -->
    <rect x="440" y="0" width="412" height="250" rx="18" fill="#0f172a" stroke="#ef4444" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="458" y="18" width="112" height="24" rx="12" fill="#ef4444" fill-opacity="0.18"/>
    <text x="470" y="35" class="label labelBad">NOT ALLOWED</text>

    <text x="464" y="86" class="eq">(x + 2)/x  ≠  2</text>
    <text x="464" y="124" class="tiny">You cannot cancel “x” across a plus.</text>
    <text x="464" y="152" class="tiny">Because x + 2 is a term, not a factor.</text>

    <!-- Bottom restriction banner -->
    <rect x="0" y="276" width="852" height="92" rx="18" fill="#0f172a" stroke="#475569" stroke-opacity="0.55" stroke-width="2"/>

    <g transform="translate(22,300)">
      <rect x="0" y="0" width="112" height="26" rx="13" fill="#e2e8f0" fill-opacity="0.12"/>
      <text x="14" y="18" class="label">RESTRICTIONS</text>

      <text x="0" y="54" class="tiny">Denominators cannot be zero. State restrictions from the original denominator:</text>
      <text x="0" y="78" class="eq">e.g.  x + 2 ≠ 0  ⇒  x ≠ −2</text>
    </g>
  </g>
</svg>
