<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Algebraic fractions: cancel factors not terms (refined white v3)" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <style>
      .title{font:800 28px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .sub{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .chip{font:700 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .label{font:800 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;letter-spacing:0.7px}
      .labelGood{fill:#166534}
      .labelBad{fill:#7f1d1d}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .eqMuted{fill:#334155}
      .body{font:500 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .hint{font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
    </style>
  </defs>

  <!-- Plain white background only (no shadows/filters) -->
  <rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

  <!-- Header (safe right margin) -->
  <g transform="translate(60,64)">
    <text x="0" y="0" class="title">Algebraic Fractions</text>
    <text x="0" y="26" class="sub">Cancel factors (products), not terms (sums).</text>

    <!-- Chips (kept well inside the canvas) -->
    <g transform="translate(520,-16)">
      <rect x="0" y="0" width="128" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="14" y="19" class="chip">Factorise first</text>
    </g>
    <g transform="translate(654,-16)">
      <rect x="0" y="0" width="150" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="14" y="19" class="chip">State restrictions</text>
    </g>
  </g>

  <!-- Layout constants:
       left=60, top=112
       cardW=378, gap=36  => 60 + 378 + 36 + 378 = 852 (48px right margin)
       bottom banner ends at y=460 (20px bottom margin)
  -->
  <g transform="translate(60,112)">
    <!-- Allowed card (smaller) -->
    <rect x="0" y="0" width="378" height="220" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="18" y="18" width="82" height="24" rx="12" fill="#dcfce7"/>
    <text x="32" y="35" class="label labelGood">ALLOWED</text>

    <text x="22" y="76" class="eq">(x² − 4)/(x + 2)</text>
    <text x="22" y="110" class="eq eqMuted">= (x+2)(x−2)/(x+2)</text>
    <text x="22" y="144" class="eq">= x − 2</text>

    <text x="22" y="174" class="hint">Why this is OK:</text>
    <text x="22" y="196" class="body">(x+2) is a common factor, so it cancels safely.</text>

    <!-- Not allowed card (smaller + more inset) -->
    <rect x="414" y="0" width="378" height="220" rx="16" fill="#ffffff" stroke="#fecaca" stroke-width="2"/>
    <rect x="432" y="18" width="110" height="24" rx="12" fill="#fee2e2"/>
    <text x="446" y="35" class="label labelBad">NOT ALLOWED</text>

    <text x="436" y="86" class="eq">(x + 2)/x  ≠  2</text>
    <text x="436" y="122" class="hint">Why not:</text>
    <text x="436" y="144" class="body">You cannot cancel “x” across a plus.</text>
    <text x="436" y="166" class="body">x + 2 is a term, not a factor.</text>

    <!-- Restrictions banner (shorter + guaranteed bottom margin) -->
    <rect x="0" y="244" width="792" height="104" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <g transform="translate(18,262)">
      <rect x="0" y="0" width="112" height="26" rx="13" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="14" y="18" class="label" fill="#0f172a">RESTRICTIONS</text>

      <text x="0" y="52" class="body">Denominators cannot be zero. Use the original denominator to find values not allowed.</text>
      <text x="0" y="82" class="eq">Example: x + 2 ≠ 0  ⇒  x ≠ −2</text>
    </g>
  </g>
</svg>
