<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Expanding a single bracket: distribute" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .arr{stroke:#7c3aed;stroke-width:4;marker-end:url(#m)}
      .bx{fill:#ffffff;stroke:#0f172a;stroke-width:2;rx:14}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Expanding a single bracket (distributive law)</text>
  <text x="40" y="92" class="s">Multiply the outside term by every term inside the bracket.</text>

  <g transform="translate(70,140)">
    <rect x="0" y="0" width="340" height="90" class="bx"/>
    <text x="30" y="55" class="eq">3(x + 4)</text>

    <line x1="360" y1="45" x2="520" y2="45" class="arr"/>

    <rect x="540" y="0" width="290" height="90" class="bx"/>
    <text x="565" y="55" class="eq">3x + 12</text>

    <text x="0" y="150" class="k">Two products:</text>
    <text x="0" y="185" class="eq">3·x = 3x</text>
    <text x="0" y="220" class="eq">3·4 = 12</text>

    <text x="0" y="285" class="k">Negative outside:</text>
    <text x="0" y="330" class="eq">−2(5 − x) = −10 + 2x</text>
    <text x="0" y="370" class="s">The minus sign flips the signs inside when distributing.</text>
  </g>
</svg>
