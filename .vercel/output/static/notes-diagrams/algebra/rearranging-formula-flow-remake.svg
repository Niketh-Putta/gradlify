<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Rearranging a formula: inverse operations flow" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .eqs{font:700 16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .bx{fill:#ffffff;stroke:#0f172a;stroke-width:2;rx:14}
      .note{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:12}
      .arr{stroke:#7c3aed;stroke-width:4;stroke-linecap:round;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="56" class="t">Rearranging formulae (inverse operations)</text>
  <text x="40" y="84" class="s">Undo operations in reverse order to isolate the subject.</text>

  <!-- Vertical flow (fits reliably on all screens) -->
  <g transform="translate(120,110)">
    <rect x="0" y="0" width="340" height="78" class="bx"/>
    <text x="24" y="50" class="eq">A = πr²</text>

    <line x1="170" y1="88" x2="170" y2="132" class="arr"/>
    <text x="360" y="112" class="s">divide both sides by π</text>

    <rect x="0" y="140" width="340" height="78" class="bx"/>
    <text x="24" y="190" class="eq">A/π = r²</text>

    <line x1="170" y1="228" x2="170" y2="272" class="arr"/>
    <text x="360" y="252" class="s">square root both sides</text>

    <rect x="0" y="280" width="340" height="78" class="bx"/>
    <text x="24" y="330" class="eq">r = √(A/π)</text>

    <!-- rules card -->
    <g transform="translate(400,0)">
      <rect x="0" y="0" width="320" height="190" class="note"/>
      <text x="18" y="38" class="k">Rule of thumb</text>
      <text x="18" y="72" class="eqs">÷k  ↔  ×k</text>
      <text x="18" y="104" class="eqs">+k  ↔  −k</text>
      <text x="18" y="136" class="eqs">square  ↔  square root</text>
      <text x="18" y="170" class="s">Do one inverse operation per line.</text>
    </g>
  </g>
</svg>
