<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Box plot with IQR highlighted">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Interquartile range (IQR) on a box plot</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">IQR is the width of the box: Q3 − Q1.</text>

  <rect x="40" y="110" width="840" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Number line -->
  <line x1="110" y1="250" x2="830" y2="250" stroke="#111827" stroke-width="4"/>

  <!-- Values: min 12, q1 18, median 25, q3 32, max 45 mapped -->
  <line x1="150" y1="250" x2="220" y2="250" stroke="#111827" stroke-width="4"/>
  <rect x="220" y="210" width="260" height="80" rx="12" fill="#d1fae5" stroke="#111827" stroke-width="3"/>
  <line x1="330" y1="210" x2="330" y2="290" stroke="#10b981" stroke-width="6"/>
  <line x1="480" y1="250" x2="610" y2="250" stroke="#111827" stroke-width="4"/>

  <!-- IQR bracket -->
  <path d="M220 175 L480 175" stroke="#6366f1" stroke-width="4"/>
  <path d="M220 175 L220 192" stroke="#6366f1" stroke-width="4"/>
  <path d="M480 175 L480 192" stroke="#6366f1" stroke-width="4"/>
  <text x="305" y="165" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#6366f1">IQR = Q3 − Q1</text>

  <!-- Labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#111827">
    <text x="140" y="305">min</text><text x="140" y="321">12</text>
    <text x="214" y="305">Q1</text><text x="214" y="321">18</text>
    <text x="316" y="305" fill="#10b981">median</text><text x="332" y="321" fill="#10b981">25</text>
    <text x="468" y="305">Q3</text><text x="468" y="321">32</text>
    <text x="602" y="305">max</text><text x="602" y="321">45</text>
  </g>

  <!-- Callout -->
  <rect x="640" y="135" width="220" height="70" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="660" y="163" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">The box contains the</text>
  <text x="660" y="183" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">middle 50% of values.</text>
</svg>
