<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Box plot and cumulative frequency overview">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Box plots & cumulative frequency</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Both help you find the median and quartiles.</text>

  <!-- Box plot panel -->
  <rect x="40" y="110" width="410" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="65" y="140" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Box plot (five-number summary)</text>

  <!-- Number line -->
  <line x1="80" y1="260" x2="410" y2="260" stroke="#111827" stroke-width="4"/>

  <!-- Example values -->
  <!-- min=12 q1=18 median=25 q3=32 max=45 mapped to line -->
  <!-- whiskers -->
  <line x1="105" y1="260" x2="150" y2="260" stroke="#111827" stroke-width="4"/>
  <line x1="345" y1="260" x2="385" y2="260" stroke="#111827" stroke-width="4"/>
  <!-- box -->
  <rect x="150" y="230" width="195" height="60" fill="#eef2ff" stroke="#111827" stroke-width="3" rx="10"/>
  <!-- median -->
  <line x1="230" y1="230" x2="230" y2="290" stroke="#6366f1" stroke-width="5"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#111827">
    <text x="95" y="292">min</text><text x="95" y="308">12</text>
    <text x="145" y="212">Q1</text><text x="145" y="225">18</text>
    <text x="220" y="212" fill="#6366f1">median</text><text x="235" y="225" fill="#6366f1">25</text>
    <text x="335" y="212">Q3</text><text x="335" y="225">32</text>
    <text x="374" y="292">max</text><text x="374" y="308">45</text>
  </g>

  <!-- CF panel -->
  <rect x="470" y="110" width="410" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="495" y="140" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Cumulative frequency curve</text>

  <!-- Axes -->
  <line x1="520" y1="300" x2="850" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="520" y1="300" x2="520" y2="170" stroke="#111827" stroke-width="3"/>
  <text x="690" y="326" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">upper class boundary</text>
  <text x="480" y="210" transform="rotate(-90 480 210)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">cumulative frequency</text>

  <!-- Curve (sketch) -->
  <path d="M520 295 C560 290 590 282 610 270 C640 252 650 230 680 215 C710 198 760 190 850 180" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>

  <!-- Quartile lines -->
  <g stroke="#6366f1" stroke-width="3" stroke-dasharray="6 6">
    <line x1="520" y1="260" x2="820" y2="260"/>
    <line x1="520" y1="230" x2="820" y2="230"/>
    <line x1="520" y1="200" x2="820" y2="200"/>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#6366f1" font-weight="700">
    <text x="825" y="264">Q1 (n/4)</text>
    <text x="825" y="234">Median (n/2)</text>
    <text x="825" y="204">Q3 (3n/4)</text>
  </g>
</svg>
