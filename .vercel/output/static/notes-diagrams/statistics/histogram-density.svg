<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Histogram and frequency density">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Histogram: height is frequency density</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Area of each bar represents the frequency.</text>

  <!-- Axes -->
  <line x1="90" y1="300" x2="820" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="300" x2="90" y2="140" stroke="#111827" stroke-width="3"/>
  <text x="90" y="132" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">freq density</text>
  <text x="760" y="326" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">value</text>

  <!-- Bars with different widths -->
  <g stroke="#111827" stroke-width="2">
    <rect x="120" y="240" width="120" height="60" fill="#eef2ff"/>
    <rect x="240" y="200" width="180" height="100" fill="#d1fae5"/>
    <rect x="420" y="220" width="90" height="80" fill="#fee2e2"/>
    <rect x="510" y="170" width="210" height="130" fill="#fef3c7"/>
  </g>

  <!-- Labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#111827">
    <text x="135" y="320">0–10</text>
    <text x="290" y="320">10–25</text>
    <text x="435" y="320">25–30</text>
    <text x="585" y="320">30–45</text>
  </g>

  <!-- Formula box -->
  <rect x="40" y="120" width="360" height="70" rx="14" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="60" y="150" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">frequency density</text>
  <text x="60" y="175" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">= frequency ÷ class width</text>

  <!-- Note -->
  <rect x="450" y="120" width="430" height="70" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="470" y="150" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">If widths are different…</text>
  <text x="470" y="175" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">the tallest bar is not always the most frequent.</text>
</svg>
