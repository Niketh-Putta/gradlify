<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Iteration table: x_{n+1}=g(x_n)" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .h{fill:#ede9fe}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Iteration (repeated substitution)</text>
  <text x="40" y="92" class="s">Use the newest value each time: x₁ = g(x₀), x₂ = g(x₁), ...</text>

  <g transform="translate(70,140)">
    <text x="0" y="0" class="eq">Example: xₙ₊₁ = √(5 + xₙ),  x₀ = 2</text>

    <rect x="0" y="30" width="520" height="270" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <rect x="0" y="30" width="520" height="55" class="h"/>

    <line x1="120" y1="30" x2="120" y2="300" class="g"/>
    <line x1="320" y1="30" x2="320" y2="300" class="g"/>

    <text x="25" y="67" class="eq">n</text>
    <text x="150" y="67" class="eq">xₙ</text>
    <text x="350" y="67" class="eq">xₙ₊₁ = g(xₙ)</text>

    <text x="25" y="130" class="eq">0</text>
    <text x="150" y="130" class="eq">2.000</text>
    <text x="350" y="130" class="eq">2.646</text>

    <text x="25" y="185" class="eq">1</text>
    <text x="150" y="185" class="eq">2.646</text>
    <text x="350" y="185" class="eq">2.765</text>

    <text x="25" y="240" class="eq">2</text>
    <text x="150" y="240" class="eq">2.765</text>
    <text x="350" y="240" class="eq">2.787</text>

    <text x="560" y="95" class="k">Stop when stable</text>
    <text x="560" y="130" class="eq">to required accuracy</text>
    <text x="560" y="185" class="eq">(e.g. 2 d.p.)</text>
  </g>
</svg>
