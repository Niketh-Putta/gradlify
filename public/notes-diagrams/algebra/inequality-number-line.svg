<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Inequalities on a number line and flipping the sign" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:3}
      .p{stroke:#7c3aed;stroke-width:5}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Inequalities on a number line</text>
  <text x="40" y="92" class="s">Open circle: &lt; or &gt;  |  Closed circle: ≤ or ≥</text>

  <g transform="translate(80,150)">
    <line x1="0" y1="90" x2="740" y2="90" class="g"/>
    <polygon points="740,90 725,82 725,98" fill="#0f172a"/>

    <!-- ticks -->
    <g class="g">
      <line x1="100" y1="78" x2="100" y2="102"/>
      <line x1="240" y1="78" x2="240" y2="102"/>
      <line x1="380" y1="78" x2="380" y2="102"/>
      <line x1="520" y1="78" x2="520" y2="102"/>
      <line x1="660" y1="78" x2="660" y2="102"/>
    </g>

    <text x="92" y="130" class="eq">−2</text>
    <text x="232" y="130" class="eq">0</text>
    <text x="372" y="130" class="eq">2</text>
    <text x="512" y="130" class="eq">4</text>
    <text x="652" y="130" class="eq">6</text>

    <text x="0" y="20" class="k">Example: x &gt; 2</text>
    <!-- open circle at 2 -->
    <circle cx="380" cy="90" r="10" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
    <line x1="395" y1="90" x2="720" y2="90" class="p"/>

    <text x="0" y="190" class="k">Flip the sign if you divide by a negative:</text>
    <text x="0" y="225" class="eq">−2x ≤ 6  →  x ≥ −3</text>
  </g>
</svg>
