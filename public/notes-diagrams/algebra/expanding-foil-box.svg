<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Expanding double brackets using the box method" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .h{fill:#ede9fe}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Expanding double brackets (box method)</text>
  <text x="40" y="92" class="s">Every term meets every term. Then collect like terms.</text>

  <g transform="translate(80,125)">
    <text x="0" y="30" class="eq">(x + 3)(x + 5)</text>

    <rect x="0" y="60" width="360" height="240" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <line x1="120" y1="60" x2="120" y2="300" class="g"/>
    <line x1="0" y1="140" x2="360" y2="140" class="g"/>

    <rect x="120" y="60" width="240" height="80" class="h"/>
    <rect x="0" y="140" width="120" height="160" class="h"/>

    <text x="35" y="112" class="eq">x</text>
    <text x="160" y="112" class="eq">x</text>
    <text x="275" y="112" class="eq">5</text>

    <text x="35" y="205" class="eq">3</text>

    <text x="150" y="205" class="eq">x·x = x²</text>
    <text x="265" y="205" class="eq">x·5 = 5x</text>
    <text x="150" y="265" class="eq">3·x = 3x</text>
    <text x="265" y="265" class="eq">3·5 = 15</text>

    <text x="420" y="105" class="k">Collect:</text>
    <text x="420" y="145" class="eq">x² + 5x + 3x + 15</text>
    <text x="420" y="185" class="eq">= x² + 8x + 15</text>
  </g>
</svg>
