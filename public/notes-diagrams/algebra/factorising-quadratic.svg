<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Factorising a quadratic using an area model" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .p{fill:#ede9fe}
      .q{fill:#dcfce7}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Factorising x² + 7x + 12</text>
  <text x="40" y="92" class="s">Find two numbers that add to 7 and multiply to 12 → 3 and 4.</text>

  <g transform="translate(70,120)">
    <text x="0" y="28" class="eq">x² + 7x + 12 = (x + 3)(x + 4)</text>

    <rect x="0" y="55" width="420" height="260" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <line x1="280" y1="55" x2="280" y2="315" class="g"/>
    <line x1="0" y1="215" x2="420" y2="215" class="g"/>

    <rect x="0" y="55" width="280" height="160" class="p"/>
    <rect x="280" y="55" width="140" height="160" class="q"/>
    <rect x="0" y="215" width="280" height="100" class="q"/>
    <rect x="280" y="215" width="140" height="100" class="p"/>

    <text x="20" y="95" class="k">x</text>
    <text x="300" y="95" class="k">4</text>
    <text x="20" y="245" class="k">3</text>

    <text x="95" y="150" class="eq">x·x = x²</text>
    <text x="305" y="150" class="eq">x·4 = 4x</text>
    <text x="95" y="275" class="eq">3·x = 3x</text>
    <text x="305" y="275" class="eq">3·4 = 12</text>

    <text x="455" y="120" class="k">Middle term:</text>
    <text x="455" y="155" class="eq">4x + 3x = 7x</text>
    <text x="455" y="215" class="k">So the factors are:</text>
    <text x="455" y="250" class="eq">(x + 3)(x + 4)</text>
  </g>
</svg>
