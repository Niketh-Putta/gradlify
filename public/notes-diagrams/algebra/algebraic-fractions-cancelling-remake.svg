<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Algebraic fractions: cancel factors not terms" preserveAspectRatio="xMidYMid meet" overflow="hidden">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .good{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}
      .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:14}
      .note{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;rx:12}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="56" class="t">Algebraic fractions: cancel factors (products)</text>
  <text x="40" y="84" class="s">Cancel only common factors (multiplication), not terms (addition/subtraction).</text>

  <g transform="translate(70,120)">
    <!-- Allowed -->
    <rect x="0" y="0" width="760" height="160" class="good"/>
    <text x="24" y="42" class="k">Allowed (factorise then cancel):</text>

    <text x="24" y="82" class="eq">
      <tspan>(x² − 4)/(x + 2)</tspan>
    </text>
    <text x="24" y="112" class="eq">
      <tspan>= (x+2)(x−2)/(x+2)</tspan>
    </text>
    <text x="24" y="142" class="eq">
      <tspan>= x − 2</tspan>
    </text>

    <!-- Not allowed -->
    <rect x="0" y="180" width="760" height="120" class="bad"/>
    <text x="24" y="222" class="k">Not allowed (these are terms):</text>
    <text x="24" y="262" class="eq">(x + 2)/x  ≠  2</text>

    <!-- Restriction note (kept inside the canvas) -->
    <rect x="0" y="320" width="760" height="70" class="note"/>
    <text x="24" y="362" class="k">Remember:</text>
    <text x="150" y="362" class="eq">denominator ≠ 0</text>
  </g>
</svg>
