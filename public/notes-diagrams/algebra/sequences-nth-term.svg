<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Arithmetic sequence nth term from common difference" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .g{stroke:#0f172a;stroke-width:2}
      .h{fill:#ede9fe}
      .bx{fill:#ffffff;stroke:#0f172a;stroke-width:2;rx:14}
    </style>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Arithmetic sequences: nth term</text>
  <text x="40" y="92" class="s">Common difference d gives you the coefficient of n.</text>

  <g transform="translate(70,140)">
    <rect x="0" y="0" width="340" height="70" class="bx"/>
    <text x="24" y="45" class="eq">3, 7, 11, 15, ...</text>

    <text x="380" y="30" class="k">Differences:</text>
    <text x="380" y="65" class="eq">+4, +4, +4</text>

    <rect x="0" y="100" width="760" height="200" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <rect x="0" y="100" width="760" height="50" class="h"/>
    <line x1="120" y1="100" x2="120" y2="300" class="g"/>
    <line x1="260" y1="100" x2="260" y2="300" class="g"/>
    <line x1="400" y1="100" x2="400" y2="300" class="g"/>
    <line x1="540" y1="100" x2="540" y2="300" class="g"/>

    <text x="35" y="135" class="eq">n</text>
    <text x="155" y="135" class="eq">1</text>
    <text x="295" y="135" class="eq">2</text>
    <text x="435" y="135" class="eq">3</text>
    <text x="575" y="135" class="eq">4</text>

    <text x="20" y="205" class="eq">term</text>
    <text x="155" y="205" class="eq">3</text>
    <text x="295" y="205" class="eq">7</text>
    <text x="435" y="205" class="eq">11</text>
    <text x="575" y="205" class="eq">15</text>

    <text x="20" y="270" class="eq">4n</text>
    <text x="155" y="270" class="eq">4</text>
    <text x="295" y="270" class="eq">8</text>
    <text x="435" y="270" class="eq">12</text>
    <text x="575" y="270" class="eq">16</text>

    <text x="0" y="345" class="k">Adjust:</text>
    <text x="120" y="345" class="eq">4n is 1 too big, so nth term = 4n − 1</text>
  </g>
</svg>
