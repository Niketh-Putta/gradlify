<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Multiply/divide rule for exchange rates" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#475569}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .eq{font:700 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:18}
      .arrow{stroke:#0f172a;stroke-width:3;fill:none;marker-end:url(#arr)}
      .arrow2{stroke:#0f172a;stroke-width:3;fill:none;marker-end:url(#arr2)}
      .tag{fill:#eef2ff;stroke:#7c3aed;stroke-width:2;rx:10}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="56" class="t">Currency exchange</text>
  <text x="40" y="84" class="s">Rule: one direction is multiply by the rate, the other is divide by the same rate.</text>

  <g transform="translate(60,90)">
    <rect x="0" y="0" width="780" height="56" class="tag"/>
    <text x="24" y="37" class="k">Example rate:</text>
    <text x="190" y="37" class="eq">£1 = €1.20</text>

    <!-- main boxes -->
    <rect x="0" y="110" width="300" height="120" class="box"/>
    <rect x="540" y="110" width="300" height="120" class="box"/>

    <text x="150" y="158" class="k" text-anchor="middle">Pounds (£)</text>
    <text x="150" y="198" class="s" text-anchor="middle">Start currency</text>

    <text x="690" y="158" class="k" text-anchor="middle">Euros (€)</text>
    <text x="690" y="198" class="s" text-anchor="middle">Converted currency</text>

    <!-- arrows (kept well separated so labels never sit on lines) -->
    <path d="M300 170 C360 170 420 170 540 170" class="arrow"/>
    <text x="420" y="146" class="eq" text-anchor="middle">× 1.20</text>

    <path d="M540 235 C480 235 420 235 300 235" class="arrow2"/>
    <text x="420" y="268" class="eq" text-anchor="middle">÷ 1.20</text>

    <!-- rules text placed away from arrows (no overlap) -->
    <text x="0" y="292" class="s">£ → € : <tspan class="eq">€ = £ × rate</tspan></text>
    <text x="0" y="318" class="s">€ → £ : <tspan class="eq">£ = € ÷ rate</tspan></text>

    <!-- sense check (kept safely inside the canvas) -->
    <text x="0" y="350" class="k">Sense check</text>
    <text x="0" y="378" class="s">Rate &gt; 1: £ → € usually makes the number bigger; € → £ usually makes it smaller.</text>
  </g>
</svg>
