<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Exchange rate with commission: apply fee then convert" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2}
      .a{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="40" y="60" class="t">Exchange rates with fees/commission</text>
  <text x="40" y="92" class="s">Handle the fee first, then convert using × or ÷</text>

  <!-- shifted left so the final box never clips on the right edge -->
  <g transform="translate(40,165)">
    <rect x="0" y="0" width="240" height="90" rx="16" class="box"/>
    <text x="120" y="40" class="k" text-anchor="middle">Start amount</text>
    <text x="120" y="68" class="s" text-anchor="middle">e.g. €580</text>

    <line x1="240" y1="45" x2="310" y2="45" class="a"/>

    <rect x="310" y="0" width="240" height="90" rx="16" class="box"/>
    <text x="430" y="40" class="k" text-anchor="middle">Apply fee</text>
    <text x="430" y="68" class="s" text-anchor="middle">€580 − €6</text>

    <line x1="550" y1="45" x2="620" y2="45" class="a"/>

    <rect x="620" y="0" width="240" height="90" rx="16" class="box"/>
    <text x="740" y="40" class="k" text-anchor="middle">Convert</text>
    <text x="740" y="68" class="s" text-anchor="middle">£ = € ÷ rate</text>
  </g>

  <text x="40" y="410" class="s">Always do a sense check: which direction should the number move?</text>
</svg>
