<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Convert between g per cm cubed and kg per m cubed">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 20px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Density units</text>
  <text x="40" y="92" class="s">Useful fact: 1 g/cm³ = 1000 kg/m³</text>

  <g transform="translate(70,140)">
    <rect x="0" y="0" width="760" height="210" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="40" y="55" width="300" height="100" rx="16" class="box"/>
    <rect x="420" y="55" width="300" height="100" rx="16" class="box"/>
    <text x="190" y="95" class="k" text-anchor="middle">g/cm³</text>
    <text x="570" y="95" class="k" text-anchor="middle">kg/m³</text>
    <text x="190" y="132" class="s" text-anchor="middle">× 1000</text>
    <text x="570" y="132" class="s" text-anchor="middle">÷ 1000</text>
    <line x1="340" y1="105" x2="420" y2="105" stroke="#64748b" stroke-width="3"/>
    <polygon points="420,105 405,98 405,112" fill="#64748b"/>
    <line x1="420" y1="135" x2="340" y2="135" stroke="#64748b" stroke-width="3"/>
    <polygon points="340,135 355,128 355,142" fill="#64748b"/>

    <text x="40" y="190" class="s">Example: 1200 kg/m³ = 1200 ÷ 1000 = 1.2 g/cm³</text>
  </g>
</svg>
