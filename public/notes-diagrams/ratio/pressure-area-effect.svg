<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Same force, different areas; smaller area gives larger pressure">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Pressure depends on area</text>
  <text x="40" y="92" class="s">Same force: smaller area → larger pressure (P = F ÷ A)</text>

  <g transform="translate(70,140)">
    <rect x="0" y="0" width="760" height="220" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>

    <text x="80" y="50" class="k">Large area</text>
    <rect x="40" y="70" width="260" height="40" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <line x1="170" y1="20" x2="170" y2="70" stroke="#16a34a" stroke-width="3"/>
    <polygon points="170,70 162,58 178,58" fill="#16a34a"/>
    <text x="170" y="20" class="s" text-anchor="middle">Force F</text>
    <text x="170" y="145" class="s" text-anchor="middle">Pressure is smaller</text>

    <text x="520" y="50" class="k">Small area</text>
    <rect x="480" y="70" width="120" height="40" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <line x1="540" y1="20" x2="540" y2="70" stroke="#ef4444" stroke-width="3"/>
    <polygon points="540,70 532,58 548,58" fill="#ef4444"/>
    <text x="540" y="20" class="s" text-anchor="middle">Force F</text>
    <text x="540" y="145" class="s" text-anchor="middle">Pressure is larger</text>

    <text x="40" y="198" class="s">Applications: knives, high heels, snowshoes, tyres</text>
  </g>
</svg>
