<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Compare unit prices using bars; lower bar means better value">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Best buys: interpret unit prices</text>
  <text x="40" y="92" class="s">After you calculate unit prices, the smaller number is better value</text>

  <g transform="translate(90,150)">
    <text x="0" y="15" class="k">Unit price (per 100 g)</text>

    <text x="0" y="70" class="s">A: £0.55</text>
    <rect x="140" y="52" width="330" height="26" rx="10" fill="#c7d2fe"/>

    <text x="0" y="125" class="s">B: £0.52</text>
    <rect x="140" y="107" width="312" height="26" rx="10" fill="#bbf7d0"/>

    <text x="0" y="190" class="s">Lower bar → better value</text>
  </g>
</svg>
