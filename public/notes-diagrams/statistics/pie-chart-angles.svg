<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Pie chart angles from frequency">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Pie charts: turn frequency into angles</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">A full circle is 360°.</text>

  <!-- Pie -->
  <g transform="translate(280 210)">
    <circle r="120" fill="#f3f4f6" stroke="#111827" stroke-width="3"/>
    <!-- sectors: 120°, 90°, 150° -->
    <path d="M0,0 L120,0 A120,120 0 0,1 -60,103.923 Z" fill="#6366f1" opacity="0.9"/>
    <path d="M0,0 L-60,103.923 A120,120 0 0,1 -120,0 Z" fill="#10b981" opacity="0.9"/>
    <path d="M0,0 L-120,0 A120,120 0 1,1 120,0 Z" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Labels -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827" font-weight="700">
    <text x="420" y="160">Angle = (frequency ÷ total) × 360</text>
    <text x="420" y="190" fill="#4b5563" font-weight="600">Example: 40 out of 120</text>
  </g>

  <rect x="420" y="210" width="460" height="96" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#111827">
    <text x="445" y="245">angle = (40 ÷ 120) × 360</text>
    <text x="445" y="275">angle = (1 ÷ 3) × 360</text>
    <text x="445" y="305">angle = 120°</text>
  </g>

  <text x="70" y="330" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#4b5563">Check: angles add up to 360°.</text>
</svg>
