<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Compare two distributions using box plots">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Compare distributions: centre and spread</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Use median (centre) and IQR/range (spread).</text>

  <!-- Panel -->
  <rect x="40" y="110" width="840" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Axes line -->
  <line x1="90" y1="290" x2="850" y2="290" stroke="#111827" stroke-width="3"/>

  <!-- Group A box plot -->
  <text x="90" y="150" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Group A</text>
  <line x1="170" y1="190" x2="310" y2="190" stroke="#111827" stroke-width="4"/>
  <rect x="310" y="165" width="180" height="50" rx="10" fill="#eef2ff" stroke="#111827" stroke-width="3"/>
  <line x1="400" y1="165" x2="400" y2="215" stroke="#6366f1" stroke-width="5"/>
  <line x1="490" y1="190" x2="590" y2="190" stroke="#111827" stroke-width="4"/>

  <!-- Group B box plot -->
  <text x="90" y="250" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Group B</text>
  <line x1="130" y1="270" x2="250" y2="270" stroke="#111827" stroke-width="4"/>
  <rect x="250" y="245" width="260" height="50" rx="10" fill="#d1fae5" stroke="#111827" stroke-width="3"/>
  <line x1="360" y1="245" x2="360" y2="295" stroke="#10b981" stroke-width="5"/>
  <line x1="510" y1="270" x2="720" y2="270" stroke="#111827" stroke-width="4"/>

  <!-- Notes -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">
    <text x="640" y="185">Centre: compare medians</text>
    <text x="640" y="210">Spread: compare IQR / range</text>
    <text x="640" y="270">Smaller spread = more consistent</text>
  </g>
</svg>
