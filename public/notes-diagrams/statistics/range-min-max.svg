<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-label="Range shown on a number line">
  <rect x="0" y="0" width="920" height="320" fill="#ffffff"/>

  <text x="40" y="55" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Range = max − min</text>
  <text x="40" y="85" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Find the smallest and largest values, then subtract.</text>

  <!-- Number line -->
  <line x1="110" y1="210" x2="820" y2="210" stroke="#111827" stroke-width="4"/>

  <!-- Min and max markers -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700" fill="#111827">
    <circle cx="200" cy="210" r="12" fill="#10b981" stroke="#111827" stroke-width="2"/>
    <text x="200" y="245" text-anchor="middle">min</text>
    <text x="200" y="270" text-anchor="middle" font-weight="600">3</text>

    <circle cx="740" cy="210" r="12" fill="#f59e0b" stroke="#111827" stroke-width="2"/>
    <text x="740" y="245" text-anchor="middle">max</text>
    <text x="740" y="270" text-anchor="middle" font-weight="600">50</text>
  </g>

  <!-- Arrow showing range -->
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="#6366f1"/>
    </marker>
  </defs>
  <line x1="220" y1="150" x2="720" y2="150" stroke="#6366f1" stroke-width="6" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="470" y="135" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#6366f1">range</text>

  <!-- Calculation box -->
  <rect x="40" y="120" width="360" height="72" rx="14" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="62" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#111827">max = 50, min = 3</text>
  <text x="62" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#111827">range = 50 − 3 = </text>
  <text x="252" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700" fill="#6366f1">47</text>
</svg>
