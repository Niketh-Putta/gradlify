<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Frequency table with midpoint and fx">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Grouped frequency table (with midpoints)</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Use midpoints to estimate the mean.</text>

  <!-- Table container -->
  <rect x="40" y="110" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- Header row -->
  <rect x="40" y="110" width="840" height="46" rx="16" fill="#e5e7eb"/>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">
    <text x="70" y="139">Class</text>
    <text x="290" y="139">Frequency (f)</text>
    <text x="470" y="139">Midpoint (x)</text>
    <text x="650" y="139">fx</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#d1d5db" stroke-width="1">
    <line x1="250" y1="110" x2="250" y2="310"/>
    <line x1="430" y1="110" x2="430" y2="310"/>
    <line x1="610" y1="110" x2="610" y2="310"/>
    <line x1="40" y1="156" x2="880" y2="156"/>
    <line x1="40" y1="206" x2="880" y2="206"/>
    <line x1="40" y1="256" x2="880" y2="256"/>
  </g>

  <!-- Rows -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#111827">
    <text x="70" y="188">10–20</text>
    <text x="310" y="188">6</text>
    <text x="500" y="188">15</text>
    <text x="650" y="188">90</text>

    <text x="70" y="238">20–30</text>
    <text x="310" y="238">9</text>
    <text x="500" y="238">25</text>
    <text x="650" y="238">225</text>

    <text x="70" y="288">30–40</text>
    <text x="310" y="288">5</text>
    <text x="500" y="288">35</text>
    <text x="650" y="288">175</text>
  </g>

  <!-- Calculation callout -->
  <rect x="520" y="318" width="360" height="32" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="540" y="340" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">Estimated mean = sum(fx) ÷ sum(f)</text>

  <!-- Midpoint formula -->
  <rect x="40" y="318" width="450" height="32" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="60" y="340" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">Midpoint = (lower + upper) ÷ 2</text>
</svg>
