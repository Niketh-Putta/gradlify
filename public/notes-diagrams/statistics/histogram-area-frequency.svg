<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Histogram bar showing area equals frequency">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Histogram: area = frequency</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">Frequency = class width × frequency density.</text>

  <!-- Axes -->
  <line x1="90" y1="300" x2="840" y2="300" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="300" x2="90" y2="140" stroke="#111827" stroke-width="3"/>
  <text x="90" y="132" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">density</text>
  <text x="800" y="326" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">value</text>

  <!-- Highlighted bar -->
  <rect x="220" y="190" width="240" height="110" fill="#d1fae5" stroke="#111827" stroke-width="2"/>
  <text x="250" y="212" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#111827">highlighted class</text>

  <!-- Width arrow -->
  <path d="M220 315 L460 315" stroke="#6366f1" stroke-width="4"/>
  <path d="M220 315 L235 308" stroke="#6366f1" stroke-width="4"/>
  <path d="M220 315 L235 322" stroke="#6366f1" stroke-width="4"/>
  <path d="M460 315 L445 308" stroke="#6366f1" stroke-width="4"/>
  <path d="M460 315 L445 322" stroke="#6366f1" stroke-width="4"/>
  <text x="290" y="346" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#6366f1">class width</text>

  <!-- Height arrow -->
  <path d="M480 300 L480 190" stroke="#f59e0b" stroke-width="4"/>
  <path d="M480 190 L473 205" stroke="#f59e0b" stroke-width="4"/>
  <path d="M480 190 L487 205" stroke="#f59e0b" stroke-width="4"/>
  <path d="M480 300 L473 285" stroke="#f59e0b" stroke-width="4"/>
  <path d="M480 300 L487 285" stroke="#f59e0b" stroke-width="4"/>
  <text x="496" y="246" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" font-weight="700" fill="#f59e0b">density</text>

  <!-- Formula card -->
  <rect x="520" y="170" width="360" height="120" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="540" y="202" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="15" font-weight="700" fill="#111827">Frequency (area)</text>
  <text x="540" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">= class width × frequency density</text>
  <text x="540" y="256" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">So even a tall bar can have</text>
  <text x="540" y="276" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">a smaller frequency if it’s narrow.</text>
</svg>
