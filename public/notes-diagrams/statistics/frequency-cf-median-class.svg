<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Cumulative frequency to find the median class">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" font-weight="700" fill="#111827">Finding the median class (cumulative frequency)</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">The median class is where cumulative frequency first reaches n ÷ 2.</text>

  <rect x="40" y="110" width="520" height="220" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>
  <rect x="40" y="110" width="520" height="44" rx="16" fill="#e5e7eb"/>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">
    <text x="70" y="138">Class</text>
    <text x="240" y="138">f</text>
    <text x="340" y="138">Cumulative f</text>
  </g>

  <g stroke="#d1d5db" stroke-width="1">
    <line x1="200" y1="110" x2="200" y2="330"/>
    <line x1="300" y1="110" x2="300" y2="330"/>
    <line x1="40" y1="154" x2="560" y2="154"/>
    <line x1="40" y1="206" x2="560" y2="206"/>
    <line x1="40" y1="258" x2="560" y2="258"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#111827">
    <text x="70" y="188">0–10</text>
    <text x="240" y="188">4</text>
    <text x="340" y="188">4</text>

    <text x="70" y="240">10–20</text>
    <text x="240" y="240">7</text>
    <text x="340" y="240">11</text>

    <text x="70" y="292">20–30</text>
    <text x="240" y="292">7</text>
    <text x="340" y="292">18</text>

    <text x="70" y="324">30–40</text>
    <text x="240" y="324">7</text>
    <text x="340" y="324">25</text>
  </g>

  <!-- Highlight median position -->
  <rect x="600" y="125" width="280" height="86" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="620" y="155" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Step 1</text>
  <text x="620" y="178" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">Total n = 25</text>
  <text x="620" y="201" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">Median position = n ÷ 2 = 12.5</text>

  <rect x="600" y="225" width="280" height="105" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="620" y="255" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Step 2</text>
  <text x="620" y="278" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">Look down the cumulative f column.</text>
  <text x="620" y="301" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" fill="#111827">11 is below 12.5, 18 is above 12.5.</text>
  <text x="620" y="324" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">Median class is 20–30.</text>

  <!-- Arrow to highlighted row -->
  <rect x="40" y="225" width="520" height="52" fill="#d1fae5" opacity="0.55"/>
  <path d="M585 310 C560 305 555 292 535 284" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
</svg>
