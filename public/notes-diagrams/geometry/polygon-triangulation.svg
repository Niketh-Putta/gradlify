<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Triangulation of a polygon into n-2 triangles" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .edge{stroke:#0f172a;stroke-width:3;fill:#f8fafc}
      .diag{stroke:#7c3aed;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Why (n−2)×180 works</text>
  <text x="40" y="92" class="s">From one vertex, split an n-gon into (n−2) triangles.</text>

  <g transform="translate(150,120)">
    <polygon points="140,20 320,90 290,250 140,310 20,220 40,80" class="edge"/>
    <line x1="140" y1="20" x2="290" y2="250" class="diag"/>
    <line x1="140" y1="20" x2="140" y2="310" class="diag"/>
    <line x1="140" y1="20" x2="20" y2="220" class="diag"/>

    <text x="450" y="90" class="k">6 sides → 4 triangles</text>
    <text x="450" y="130" class="k">Sum = 4×180 = 720°</text>
  </g>
</svg>
