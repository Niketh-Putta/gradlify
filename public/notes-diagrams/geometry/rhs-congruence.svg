<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="RHS congruence: right angle, hypotenuse and one side" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .a{fill:#a78bfa;opacity:.20;stroke:#7c3aed;stroke-width:3}
      .b{fill:#86efac;opacity:.18;stroke:#16a34a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">RHS: a special congruence test for right triangles</text>
  <text x="40" y="92" class="s">If the right angle, hypotenuse, and one other side match, the triangles are congruent.</text>

  <g transform="translate(140,130)">
    <polygon points="0,240 240,240 0,60" class="a"/>
    <rect x="0" y="220" width="18" height="18" fill="none" stroke="#0f172a" stroke-width="2"/>
    <text x="110" y="270" class="k">hypotenuse</text>
    <text x="10" y="155" class="k" transform="rotate(-90 10 155)">side</text>

    <polygon points="420,240 660,240 420,60" class="b"/>
    <rect x="420" y="220" width="18" height="18" fill="none" stroke="#0f172a" stroke-width="2"/>
    <text x="530" y="270" class="k">hypotenuse</text>
    <text x="410" y="155" class="k" transform="rotate(-90 410 155)">side</text>

    <text x="720" y="140" class="k">R + H + S match → congruent</text>
  </g>
</svg>
