<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Prism volume = area of cross-section times length" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .a{fill:#a78bfa;opacity:.25;stroke:#7c3aed;stroke-width:3}
      .b{fill:#f8fafc;stroke:#0f172a;stroke-width:3}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Prisms: volume = cross-section area × length</text>
  <text x="40" y="92" class="s">The cross-section is the same all the way along.</text>

  <g transform="translate(140,140)">
    <polygon points="80,220 200,220 160,80" class="a"/>
    <polygon points="280,220 400,220 360,80" class="a"/>
    <polygon points="80,220 280,220 240,80 160,80" class="b"/>
    <polygon points="200,220 400,220 360,80 240,80" class="b"/>

    <line x1="220" y1="250" x2="360" y2="250" stroke="#16a34a" stroke-width="4"/>
    <text x="290" y="285" class="k" text-anchor="middle">length</text>
  </g>
</svg>
