<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Position vectors OA and OB" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Position vectors</text>
  <text x="40" y="92" class="s">A position vector goes from the origin O to a point.</text>

  <g transform="translate(140,130)">
    <line x1="0" y1="240" x2="420" y2="240" stroke="#0f172a" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="240" stroke="#0f172a" stroke-width="3"/>

    <circle cx="0" cy="240" r="4" fill="#0f172a"/>
    <text x="10" y="235" class="k">O</text>

    <circle cx="240" cy="120" r="4" fill="#0f172a"/>
    <text x="250" y="115" class="k">A</text>

    <circle cx="330" cy="70" r="4" fill="#0f172a"/>
    <text x="340" y="65" class="k">B</text>

    <line x1="0" y1="240" x2="240" y2="120" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="240" x2="330" y2="70" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>

    <text x="150" y="150" class="k">OA</text>
    <text x="210" y="95" class="k">OB</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="currentColor" />
    </marker>
  </defs>
</svg>
