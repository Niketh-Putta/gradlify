<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="Back bearing is 180 degrees different" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t{font:700 26px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .s{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .k{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0f172a}
      .m{font:700 20px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#0f172a}
      .accent{stroke:#7c3aed;stroke-width:4;fill:none}
    </style>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="60" class="t">Back bearing</text>
  <text x="40" y="92" class="s">Reverse direction: add 180° (or subtract 180° if needed).</text>

  <g transform="translate(190,120)">
    <circle cx="200" cy="160" r="140" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
    <line x1="200" y1="160" x2="200" y2="20" stroke="#0f172a" stroke-width="3"/>
    <line x1="200" y1="160" x2="320" y2="230" stroke="#7c3aed" stroke-width="4"/>
    <line x1="200" y1="160" x2="80" y2="90" stroke="#16a34a" stroke-width="4"/>
    <text x="300" y="255" class="k">065°</text>
    <text x="60" y="80" class="k">245°</text>
  </g>

  <g transform="translate(620,190)">
    <text x="0" y="0" class="m">065° + 180° = 245°</text>
  </g>
</svg>
