<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Sample space grid for two events">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="56" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#111827">Sample space diagram (grid)</text>
  <text x="40" y="86" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">List outcomes systematically to avoid missing combinations.</text>

  <rect x="40" y="120" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- grid 4x4 example (two spinners 1–4) -->
  <rect x="140" y="155" width="320" height="160" fill="#ffffff" stroke="#111827" stroke-width="3" rx="12"/>
  <g stroke="#d1d5db" stroke-width="1">
    <line x1="220" y1="155" x2="220" y2="315"/>
    <line x1="300" y1="155" x2="300" y2="315"/>
    <line x1="380" y1="155" x2="380" y2="315"/>
    <line x1="140" y1="195" x2="460" y2="195"/>
    <line x1="140" y1="235" x2="460" y2="235"/>
    <line x1="140" y1="275" x2="460" y2="275"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#111827">
    <text x="170" y="182">1</text><text x="250" y="182">2</text><text x="330" y="182">3</text><text x="410" y="182">4</text>
    <text x="120" y="222">1</text>
    <text x="120" y="262">2</text>
    <text x="120" y="302">3</text>
    <text x="120" y="342" display="none">4</text>
  </g>

  <!-- fill pairs (row label on left is spinner B, top label is spinner A) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#4b5563">
    <text x="156" y="220">(1,1)</text><text x="236" y="220">(2,1)</text><text x="316" y="220">(3,1)</text><text x="396" y="220">(4,1)</text>
    <text x="156" y="260">(1,2)</text><text x="236" y="260">(2,2)</text><text x="316" y="260">(3,2)</text><text x="396" y="260">(4,2)</text>
    <text x="156" y="300">(1,3)</text><text x="236" y="300">(2,3)</text><text x="316" y="300">(3,3)</text><text x="396" y="300">(4,3)</text>
  </g>

  <!-- highlight a condition example: sum = 5 (2,3) and (3,2) and (4,1) and (1,4 not shown) -->
  <rect x="300" y="235" width="80" height="40" fill="#d1fae5" opacity="0.7"/>
  <rect x="220" y="275" width="80" height="40" fill="#d1fae5" opacity="0.7"/>
  <rect x="380" y="195" width="80" height="40" fill="#d1fae5" opacity="0.7"/>

  <rect x="520" y="165" width="360" height="130" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="540" y="195" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="15" font-weight="700" fill="#111827">Example use</text>
  <text x="540" y="220" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">Count highlighted outcomes that satisfy a condition.</text>
  <text x="540" y="245" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#4b5563">Probability = favourable ÷ total outcomes.</text>
</svg>
