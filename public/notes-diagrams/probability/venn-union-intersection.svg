<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Venn diagram showing union and intersection">
  <rect width="920" height="360" fill="#ffffff"/>
  <text x="40" y="56" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="700" fill="#111827">Venn diagrams: union and intersection</text>
  <text x="40" y="86" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" fill="#4b5563">A ∪ B means “A or B”. A ∩ B means “A and B”.</text>

  <rect x="40" y="120" width="840" height="200" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/>

  <!-- universe -->
  <rect x="90" y="150" width="420" height="150" rx="14" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="100" y="170" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" fill="#4b5563">Universe</text>

  <!-- circles -->
  <circle cx="240" cy="225" r="70" fill="#10b981" opacity="0.18" stroke="#111827" stroke-width="3"/>
  <circle cx="340" cy="225" r="70" fill="#6366f1" opacity="0.18" stroke="#111827" stroke-width="3"/>

  <!-- intersection highlight -->
  <path d="M290 175
           C315 190 315 260 290 275
           C265 260 265 190 290 175 Z" fill="#f59e0b" opacity="0.35"/>

  <text x="210" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">A</text>
  <text x="365" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">B</text>

  <!-- legend cards -->
  <rect x="550" y="155" width="330" height="70" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="570" y="184" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">A ∪ B (union)</text>
  <text x="570" y="206" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">Everything in A or B (including overlap)</text>

  <rect x="550" y="235" width="330" height="70" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="570" y="264" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#111827">A ∩ B (intersection)</text>
  <text x="570" y="286" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="13" fill="#111827">Only the overlap (shaded in orange)</text>
</svg>
